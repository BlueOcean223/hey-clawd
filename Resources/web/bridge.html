<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #pet-container {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  #pet-container object {
    width: 190%;
    height: 130%;
    position: absolute;
    left: -45%;
    top: -25%;
    opacity: 1;
  }
  #pet-container.mini-left {
    transform: scaleX(-1);
  }
</style>
</head>
<body>
  <div id="pet-container">
    <object id="clawd" type="image/svg+xml"></object>
  </div>
  <script src="bridge.js"></script>
</body>
</html>
