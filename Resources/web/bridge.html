<!DOCTYPE html>
<!-- bridge.html — WKWebView 内的 SVG 容器页面。
     Swift 通过 evaluateJavaScript 调用 bridge.js 中的 HeyClawdBridge API，
     将 SVG 内联挂载到 #pet-container，并以 30Hz 轮询 hitTestAt 做命中检测。
     背景透明，溢出隐藏，所有布局由 CSS 控制。 -->
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #pet-container {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  /* SVG 溢出容器边界以还原原版的视觉比例（与 clawd-on-desk 一致）。 */
  #pet-container > svg {
    width: 190%;
    height: 130%;
    position: absolute;
    left: -45%;
    top: -25%;
    opacity: 1;
  }
  #pet-container.mini-left {
    transform: scaleX(-1);
  }
</style>
</head>
<body>
  <div id="pet-container"></div>
  <script src="bridge.js"></script>
</body>
</html>
