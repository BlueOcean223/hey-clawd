<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* ===== Mini Peek: hover-triggered curious peek ===== */
      /*
        Looping. Character leans slightly more into view.
        Body shifts left ~2px (peeking further in).
        Eyes are wider/alert, tracking mouse.
        Arm extends out more, gentle beckoning sway.
        Breathe 3.2s, blink 5s (slower = attentive).
      */

      /* ===== 1. Sub-animations ===== */
      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      .eyes-blink {
        transform-origin: 7.5px 9px;
        animation: eye-blink-peek 5s infinite ease-in-out;
      }

      /* ===== 2. Body peek: slight lean inward ===== */
      .peek-lean {
        animation: peek-body 6.4s infinite ease-in-out;
      }

      /* ===== 3. Arm: gentle beckoning sway ===== */
      .arm-beckon {
        transform-origin: 2px 9px;
        animation: arm-beckon 3.2s infinite ease-in-out;
      }

      /* ===== 5. JS hooks ===== */
      #eyes-js, #body-js {
        transition: transform 0.2s ease-out;
      }

      /* ===== Keyframes ===== */
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50%      { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }

      /* Slower blink = more attentive/curious */
      @keyframes eye-blink-peek {
        0%, 8%, 100% { transform: scaleY(1); }
        4%           { transform: scaleY(0.1); }
      }

      /* Body gently sways as if leaning in to look */
      @keyframes peek-body {
        0%, 100% { transform: translate(-1px, 0) rotate(-1deg); }
        50%      { transform: translate(-2px, -0.5px) rotate(-2deg); }
      }

      /* Arm: slow gentle beckoning */
      @keyframes arm-beckon {
        0%, 100% { transform: rotate(10deg); }
        30%      { transform: rotate(-5deg); }
        60%      { transform: rotate(15deg); }
      }
    </style>
  </defs>

  <!-- No shadow (mini mode) -->

  <!-- Entire character tilted -12deg (mini mode) -->
  <g transform="rotate(-12, 7.5, 15)">

    <!-- Layer 1: Legs (independent, static) -->
    <g fill="#DE886D">
      <rect x="3" y="11" width="1" height="4"/>
      <rect x="5" y="11" width="1" height="4"/>
      <rect x="9" y="11" width="1" height="4"/>
      <rect x="11" y="11" width="1" height="4"/>
    </g>

    <!-- Layer 2: Upper Body (peek lean wraps body) -->
    <g class="peek-lean">
      <g id="body-js">
        <g class="breathe-anim">
          <!-- Torso -->
          <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>

          <!-- Left Arm (extended, beckoning) -->
          <g class="arm-beckon">
            <rect x="-1.5" y="9" width="4.5" height="2" fill="#DE886D"/>
          </g>

          <!-- Right Arm -->
          <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>

          <!-- Eyes: JS tracking + slower blink (curious) -->
          <g id="eyes-js" fill="#000">
            <g class="eyes-blink">
              <rect x="4" y="8" width="1" height="2"/>
              <rect x="10" y="8" width="1" height="2"/>
            </g>
          </g>
        </g>
      </g>
    </g>

  </g>
</svg>
