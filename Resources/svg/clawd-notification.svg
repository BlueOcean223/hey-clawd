<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <style>
    .hc-body { animation: hc-double-tap 1.5s infinite; transform-origin: 7.5px 15px; }
    .hc-r-arm { transform-origin: 13px 10px; animation: hc-wave 1.5s infinite; }
    .hc-eyes { animation: hc-eyes-wide 1.5s infinite; transform-origin: 7.5px 9px; }
    .hc-bell { fill: #FFD700; opacity: 0; animation: hc-bell-pop 1.5s infinite; transform-origin: 7.5px 0px; }
    .hc-ripple { fill: #40C4FF; opacity: 0; animation: hc-ripple-out 1.5s infinite; transform-origin: 9px 0px; }
    
    @keyframes hc-double-tap {
      0%, 40%, 100% { transform: translateY(0); }
      5%, 15% { transform: translateY(-3px); }
      10%, 20% { transform: translateY(0); }
    }
    
    @keyframes hc-wave {
      0%, 25% { transform: rotate(0); }
      30%, 40%, 50%, 60% { transform: rotate(-60deg); }
      35%, 45%, 55% { transform: rotate(-30deg); }
      70%, 100% { transform: rotate(0); }
    }
    
    @keyframes hc-eyes-wide {
      0%, 25% { transform: scaleY(1); }
      30%, 70% { transform: scaleY(1.3); }
      75%, 100% { transform: scaleY(1); }
    }
    
    @keyframes hc-bell-pop {
      0%, 25% { opacity: 0; transform: scale(0.5); }
      30% { opacity: 1; transform: scale(1.2); }
      35%, 70% { opacity: 1; transform: scale(1) rotate(15deg); }
      45%, 65% { transform: scale(1) rotate(-15deg); }
      85%, 100% { opacity: 0; transform: scale(0.5); }
    }
    
    @keyframes hc-ripple-out {
      30% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.5; }
      100% { opacity: 0; transform: scale(2.5); }
    }
  </style>
  
  <g class="hc-body">
    <rect x="3" y="15" width="9" height="1" fill="rgba(0,0,0,0.15)" />
    <rect x="3" y="13" width="1" height="2" fill="#DE886D" />
    <rect x="5" y="13" width="1" height="2" fill="#DE886D" />
    <rect x="9" y="13" width="1" height="2" fill="#DE886D" />
    <rect x="11" y="13" width="1" height="2" fill="#DE886D" />
    <rect x="2" y="6" width="11" height="7" fill="#DE886D" />
    <rect x="0" y="9" width="2" height="2" fill="#DE886D" />
    <rect class="hc-r-arm" x="13" y="9" width="2" height="2" fill="#DE886D" />
    <g class="hc-eyes">
      <rect x="4" y="8" width="1" height="2" fill="#000000" />
      <rect x="10" y="8" width="1" height="2" fill="#000000" />
    </g>
  </g>
  
  <g class="hc-bell">
    <rect x="6" y="-2" width="3" height="3" />
    <rect x="7" y="-3" width="1" height="1" />
  </g>
  
  <!-- Pixel ripple rings (rects instead of circles) -->
  <rect class="hc-ripple" x="1" y="-1" width="13" height="1" style="animation-delay: 0s;"/>
  <rect class="hc-ripple" x="1" y="-1" width="13" height="1" style="animation-delay: 0.2s;"/>
</svg>
