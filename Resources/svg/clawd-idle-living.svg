<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* ===== 1. Independent sub-animations (breathing, blink) ===== */

      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      .eyes-blink {
        transform-origin: 7.5px 9px;
        animation: eye-blink 16s infinite linear;
      }

      /* ===== 2. Main 16s timeline ===== */

      .action-body {
        transform-origin: 7.5px 13px;
        animation: action-body 16s infinite ease-in-out;
      }

      .shadow-anim {
        transform-origin: 7.5px 15.5px;
        animation: shadow-action 16s infinite ease-in-out;
      }

      /* ===== 3. Component animations ===== */

      .arm-l {
        transform-origin: 1px 10px;
        animation: arm-l-idle 16s infinite ease-in-out;
      }

      .arm-r {
        transform-origin: 14px 10px;
        animation: arm-r-idle 16s infinite ease-in-out;
      }

      .eyes-look {
        animation: eye-track 16s infinite ease-in-out;
      }

      .yawn-mouth {
        transform-origin: 7.5px 11px;
        animation: yawn-mouth-anim 16s infinite ease-in-out;
        opacity: 0;
      }

      .yawn-tear {
        animation: tear-fall 16s infinite ease-in-out;
        opacity: 0;
      }

      /* ===== Keyframes ===== */

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50%      { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }

      /*
       * 16s master timeline:
       *   0%-8%    idle (breathe + blink only)
       *  10%-22%   look right (eyes +3px, body +1px)
       *  24%-26%   return center
       *  28%-36%   left arm scratch (3 rapid up-down)
       *  38%-52%   look left (eyes -3px, body -1px)
       *  55%-57%   return center
       *  60%-76%   yawn (body stretch + mouth + tear + arms out + eyes shut)
       *  78%       land squash (scaleY 0.95)
       *  80%-100%  settle back to idle
       */

      @keyframes action-body {
        0%, 8%          { transform: scale(1, 1) translate(0, 0); }
        /* look right */
        12%, 22%        { transform: scale(1, 1) translate(1px, 0); }
        /* return center */
        26%, 28%        { transform: scale(1, 1) translate(0, 0); }
        /* scratch lean */
        30%, 36%        { transform: scale(1, 1) translate(0.5px, 0); }
        /* return + look left */
        38%             { transform: scale(1, 1) translate(0, 0); }
        42%, 50%        { transform: scale(1, 1) translate(-1px, 0); }
        /* return center */
        55%             { transform: scale(1, 1) translate(0, 0); }
        /* yawn: stretch up */
        60%             { transform: scale(0.95, 1.05) translate(0, -1px); }
        65%             { transform: scale(0.9, 1.1) translate(0, -2px); }
        /* yawn: peak hold */
        70%             { transform: scale(0.9, 1.1) translate(0, -2px); }
        /* heavy sigh squash */
        72%             { transform: scale(1.05, 0.95) translate(0, 1px); }
        /* recover */
        76%             { transform: scale(1, 1) translate(0, 0); }
        /* land micro-squash */
        78%             { transform: scale(1.02, 0.97) translate(0, 0.3px); }
        80%, 100%       { transform: scale(1, 1) translate(0, 0); }
      }

      @keyframes shadow-action {
        0%, 8%          { transform: scaleX(1) translate(0, 0); opacity: 0.5; }
        12%, 22%        { transform: scaleX(1) translate(1px, 0); opacity: 0.5; }
        26%, 28%        { transform: scaleX(1) translate(0, 0); opacity: 0.5; }
        30%, 36%        { transform: scaleX(1) translate(0.5px, 0); opacity: 0.5; }
        38%             { transform: scaleX(1) translate(0, 0); opacity: 0.5; }
        42%, 50%        { transform: scaleX(1) translate(-1px, 0); opacity: 0.5; }
        55%             { transform: scaleX(1) translate(0, 0); opacity: 0.5; }
        /* yawn: body lifts, shadow narrows */
        60%             { transform: scaleX(0.95) translate(0, 0); opacity: 0.45; }
        65%, 70%        { transform: scaleX(0.9) translate(0, 0); opacity: 0.4; }
        /* squash: shadow widens */
        72%             { transform: scaleX(1.08) translate(0, 0); opacity: 0.55; }
        76%             { transform: scaleX(1) translate(0, 0); opacity: 0.5; }
        78%             { transform: scaleX(1.03) translate(0, 0); opacity: 0.52; }
        80%, 100%       { transform: scaleX(1) translate(0, 0); opacity: 0.5; }
      }

      @keyframes eye-track {
        0%, 10%         { transform: translate(0, 0); }
        /* look right */
        12%, 22%        { transform: translate(3px, 0); }
        25%, 28%        { transform: translate(0, 0); }
        /* look left */
        42%, 50%        { transform: translate(-3px, 0); }
        55%             { transform: translate(0, 0); }
        /* look slightly up during yawn */
        60%, 72%        { transform: translate(0, -1px); }
        76%, 100%       { transform: translate(0, 0); }
      }

      @keyframes eye-blink {
        /* regular blinks scattered across 16s */
        0%, 3%          { transform: scaleY(1); }
        5%              { transform: scaleY(0.1); }
        7%, 18%         { transform: scaleY(1); }
        20%             { transform: scaleY(0.1); }
        22%, 43%        { transform: scaleY(1); }
        45%             { transform: scaleY(0.1); }
        47%, 58%        { transform: scaleY(1); }
        /* yawn: eyes shut */
        62%, 72%        { transform: scaleY(0.1); }
        75%, 83%        { transform: scaleY(1); }
        85%             { transform: scaleY(0.1); }
        87%, 100%       { transform: scaleY(1); }
      }

      @keyframes arm-l-idle {
        0%, 28%         { transform: translate(0, 0) rotate(0deg); }
        /* scratch sequence: 3 rapid up-down cycles */
        30%             { transform: translate(1px, -3px) rotate(15deg); }
        31%             { transform: translate(1.5px, -4px) rotate(35deg); }
        32%             { transform: translate(0.5px, -2.5px) rotate(0deg); }
        33%             { transform: translate(1.5px, -4px) rotate(35deg); }
        34%             { transform: translate(0.5px, -2.5px) rotate(0deg); }
        35%             { transform: translate(1.5px, -4px) rotate(35deg); }
        36%             { transform: translate(0.5px, -2.5px) rotate(0deg); }
        38%, 58%        { transform: translate(0, 0) rotate(0deg); }
        /* yawn stretch outward */
        62%             { transform: translate(-1px, -2px) rotate(45deg); }
        65%             { transform: translate(-2px, -3px) rotate(80deg); }
        70%             { transform: translate(-2px, -3px) rotate(80deg); }
        72%             { transform: translate(0, 1px) rotate(-15deg); }
        76%, 100%       { transform: translate(0, 0) rotate(0deg); }
      }

      @keyframes arm-r-idle {
        0%, 58%         { transform: translate(0, 0) rotate(0deg); }
        /* yawn stretch outward (asymmetric timing vs left) */
        63%             { transform: translate(1px, -2px) rotate(-40deg); }
        66%             { transform: translate(2px, -3px) rotate(-80deg); }
        70%             { transform: translate(2px, -3px) rotate(-80deg); }
        73%             { transform: translate(0, 1px) rotate(15deg); }
        77%, 100%       { transform: translate(0, 0) rotate(0deg); }
      }

      @keyframes yawn-mouth-anim {
        0%, 58%, 76%, 100% { opacity: 0; transform: scale(0.1); }
        60%                { opacity: 1; transform: scale(0.5, 0.2); }
        65%                { opacity: 1; transform: scale(1.1, 1.4); }
        70%                { opacity: 1; transform: scale(1.1, 1.4); }
        72%                { opacity: 1; transform: scale(0.6, 0.4); }
        75%                { opacity: 0; transform: scale(0.1); }
      }

      @keyframes tear-fall {
        0%, 64%, 78%, 100% { opacity: 0; transform: translateY(0); }
        66%                { opacity: 1; transform: translateY(0); }
        72%                { opacity: 1; transform: translateY(2.5px); }
        75%                { opacity: 0; transform: translateY(3px); }
      }
    </style>
  </defs>

  <!-- Layer 0: Ground Shadow -->
  <rect class="shadow-anim" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>

  <!-- Layer 1: Static Legs (independent of body transforms) -->
  <g id="legs" fill="#DE886D">
    <rect x="3" y="12" width="1" height="3"/>
    <rect x="5" y="12" width="1" height="3"/>
    <rect x="9" y="12" width="1" height="3"/>
    <rect x="11" y="12" width="1" height="3"/>
  </g>

  <!-- Layer 2: Animated Upper Body (action > breathe nesting) -->
  <g class="action-body">
    <g class="breathe-anim">

      <!-- Torso -->
      <rect id="torso" x="2" y="6" width="11" height="7" fill="#DE886D"/>

      <!-- Left Arm (scratch + yawn stretch) -->
      <g class="arm-l">
        <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
      </g>

      <!-- Right Arm (yawn stretch only, asymmetric) -->
      <g class="arm-r">
        <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
      </g>

      <!-- Yawn Mouth (hidden by default) -->
      <rect class="yawn-mouth" x="6" y="10" width="3" height="2" fill="#000000"/>

      <!-- Eyes: CSS look position > CSS blink -->
      <g class="eyes-look" fill="#000000">
        <g class="eyes-blink">
          <rect x="4" y="8" width="1" height="2"/>
          <rect x="10" y="8" width="1" height="2"/>
        </g>
      </g>

      <!-- Yawn Tear (tiny detail during stretch) -->
      <rect class="yawn-tear" x="3.5" y="10" width="1" height="1" fill="#40C4FF"/>

    </g>
  </g>
</svg>
