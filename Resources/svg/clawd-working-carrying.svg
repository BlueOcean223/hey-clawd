<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <style>
    @keyframes hc-carry-plod {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(0.6px); }
    }
    @keyframes hc-carry-lleg {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-0.8px); }
    }
    @keyframes hc-carry-rleg {
      0%, 100% { transform: translateY(-0.8px); }
      50% { transform: translateY(0); }
    }
    @keyframes hc-carry-strain {
      0%, 100% { transform: rotate(6deg); }
      50% { transform: rotate(8deg); }
    }
    @keyframes hc-carry-sweat {
      0%, 55% { opacity: 0; transform: translateY(0); }
      60% { opacity: 0.8; }
      100% { opacity: 0; transform: translateY(3px); }
    }
    .hc-carry-body { animation: hc-carry-strain 0.6s ease-in-out infinite; transform-origin: 7.5px 13px; }
    .hc-carry-plod { animation: hc-carry-plod 0.6s ease-in-out infinite; }
    .hc-carry-lleg { animation: hc-carry-lleg 0.6s ease-in-out infinite; }
    .hc-carry-rleg { animation: hc-carry-rleg 0.6s ease-in-out infinite; }
    .hc-carry-sweat { animation: hc-carry-sweat 2s ease-out infinite; }
  </style>

  <g class="hc-carry-plod">
    <g class="hc-carry-body">
      <!-- Shadow -->
      <rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
      <!-- Torso -->
      <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
      <!-- Eyes (strained, squinted) -->
      <rect x="4" y="8.5" width="1" height="1" fill="#000"/>
      <rect x="10" y="8.5" width="1" height="1" fill="#000"/>
      <!-- Legs -->
      <g class="hc-carry-lleg">
        <rect x="3" y="13" width="1" height="2" fill="#DE886D"/>
        <rect x="5" y="13" width="1" height="2" fill="#DE886D"/>
      </g>
      <g class="hc-carry-rleg">
        <rect x="9" y="13" width="1" height="2" fill="#DE886D"/>
        <rect x="11" y="13" width="1" height="2" fill="#DE886D"/>
      </g>
      <!-- Arms extended forward holding crate -->
      <rect x="-1" y="10" width="3" height="2" fill="#DE886D"/>
      <rect x="13" y="10" width="3" height="2" fill="#DE886D"/>

      <!-- Pixel Crate (small, held between arms, below torso level) -->
      <rect x="0" y="11" width="5" height="4" fill="#8D6E63"/>
      <rect x="0.5" y="11.5" width="4" height="3" fill="#A1887F"/>
      <!-- Cross boards -->
      <rect x="2" y="11" width="1" height="4" fill="#795548"/>
      <rect x="0" y="12.5" width="5" height="0.8" fill="#795548"/>

      <!-- Sweat drop pixel -->
      <rect class="hc-carry-sweat" x="12" y="5" width="1" height="1" fill="#64B5F6"/>
    </g>
  </g>
</svg>
