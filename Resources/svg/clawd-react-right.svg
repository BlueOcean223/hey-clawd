<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* ===== 2.5s one-shot: turn right + question mark pop ===== */
      /* Timeline: 0-15% prep | 16-40% action | 40-56% hold+effect | 56-84% return | 84-100% settle */

      /* 1. Eye blink (keeps character alive, independent loop) */
      .eyes-blink {
        transform-origin: 7.5px 9px;
        animation: eye-blink 3s infinite linear;
      }

      /* 2. Main timeline: body turns right */
      .action-body {
        transform-origin: 7.5px 13px;
        animation: body-look-r 2.5s 1 ease-in-out forwards;
      }

      /* 3. Component animations */
      .eyes-look {
        animation: eyes-look-r 2.5s 1 ease-in-out forwards;
      }
      .arm-r {
        transform-origin: 13px 10px;
        animation: arm-r-react 2.5s 1 ease-in-out forwards;
      }

      /* 4. Effects */
      .shadow-anim {
        transform-origin: 7.5px 15.5px;
        animation: shadow-react 2.5s 1 ease-in-out forwards;
      }
      .question-pop {
        transform-origin: center;
        animation: question-r 2.5s 1 ease-in-out forwards;
        opacity: 0;
      }

      /* ===== Keyframes ===== */

      /* Body turns right then returns */
      @keyframes body-look-r {
        0%, 8%    { transform: translate(0, 0) rotate(0deg); }
        /* prep: slight left lean */
        12%       { transform: translate(-0.5px, 0) rotate(-0.5deg); }
        /* action: turn right */
        16%, 56%  { transform: translate(2px, 0) rotate(2deg); }
        /* return */
        84%, 100% { transform: translate(0, 0) rotate(0deg); }
      }

      /* Eyes lead the body (larger offset) */
      @keyframes eyes-look-r {
        0%, 8%    { transform: translate(0, 0); }
        14%, 56%  { transform: translate(3px, 0); }
        84%, 100% { transform: translate(0, 0); }
      }

      /* Right arm raises with body turn */
      @keyframes arm-r-react {
        0%, 8%    { transform: translate(0, 0) rotate(0deg); }
        16%, 56%  { transform: translate(1px, -2px) rotate(-15deg); }
        84%, 100% { transform: translate(0, 0) rotate(0deg); }
      }

      /* Blinking (looping, keeps character alive) */
      @keyframes eye-blink {
        0%, 13%, 17%, 80%, 84%, 100% { transform: scaleY(1); }
        15%, 82% { transform: scaleY(0.1); }
      }

      /* Question mark: scale(0) -> scale(overshoot) -> scale(1) -> float away */
      @keyframes question-r {
        0%, 12%   { opacity: 0; transform: translate(6px, 6px) scale(0); }
        20%       { opacity: 1; transform: translate(8px, -1px) scale(1.2); }
        26%, 48%  { opacity: 1; transform: translate(8px, -2px) scale(1); }
        64%, 100% { opacity: 0; transform: translate(8px, -8px) scale(1.2); }
      }

      /* Shadow follows body shift */
      @keyframes shadow-react {
        0%, 8%    { transform: translate(0, 0) scaleX(1); opacity: 0.5; }
        16%, 56%  { transform: translate(1px, 0) scaleX(0.98); opacity: 0.48; }
        84%, 100% { transform: translate(0, 0) scaleX(1); opacity: 0.5; }
      }
    </style>

    <!-- Pixel question mark definition -->
    <g id="pixel-question">
      <rect x="1" y="0" width="2" height="1"/>
      <rect x="0" y="1" width="1" height="1"/>
      <rect x="3" y="1" width="1" height="2"/>
      <rect x="2" y="3" width="1" height="1"/>
      <rect x="1" y="4" width="1" height="1"/>
      <rect x="1" y="6" width="1" height="1"/>
    </g>
  </defs>

  <!-- Layer 0: Shadow -->
  <rect class="shadow-anim" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>

  <!-- Layer 1: Legs (static, independent) -->
  <g id="legs" fill="#DE886D">
    <rect x="3" y="13" width="1" height="2"/>
    <rect x="5" y="13" width="1" height="2"/>
    <rect x="9" y="13" width="1" height="2"/>
    <rect x="11" y="13" width="1" height="2"/>
  </g>

  <!-- Layer 2: Upper Body -->
  <g class="action-body">
    <g fill="#DE886D">
      <rect x="2" y="6" width="11" height="7"/>
      <!-- Left arm (static) -->
      <rect x="0" y="9" width="2" height="2"/>
      <!-- Right arm (animated raise) -->
      <g class="arm-r">
        <rect x="13" y="9" width="2" height="2"/>
      </g>
    </g>
    <!-- Eyes: look wrapper > blink wrapper > eye rects -->
    <g class="eyes-look">
      <g class="eyes-blink" fill="#000">
        <rect x="4" y="8" width="1" height="2"/>
        <rect x="10" y="8" width="1" height="2"/>
      </g>
    </g>
  </g>

  <!-- Layer 3: Question mark effect -->
  <g class="question-pop" fill="#FFC107" transform="translate(10, 0)">
    <use href="#pixel-question"/>
  </g>
</svg>
