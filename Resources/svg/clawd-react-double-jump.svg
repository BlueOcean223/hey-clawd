<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
<style>
  /* two hops: small -6px then big -14px. 1.8s action + 1.5s rest = 3.3s */
  .hc-dj-wrap  { animation: hc-dj-hop 3.3s ease-in-out infinite; }
  .hc-dj-larm  { animation: hc-dj-la 3.3s ease-in-out infinite; transform-box: fill-box; transform-origin: 100% 50%; }
  .hc-dj-rarm  { animation: hc-dj-ra 3.3s ease-in-out infinite; transform-box: fill-box; transform-origin: 0% 50%; }
  .hc-dj-eyes  { animation: hc-dj-ey 3.3s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 50%; }
  .hc-dj-torso { animation: hc-dj-squash 3.3s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 100%; }
  .hc-dj-shadow { animation: hc-dj-shad 3.3s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 50%; }

  @keyframes hc-dj-hop {
    0%,100%     { transform: translateY(0); }
    /* small hop */
    12%         { transform: translateY(-6px); }
    22%         { transform: translateY(0); }
    /* big hop */
    37%         { transform: translateY(-14px); }
    53%         { transform: translateY(0); }
    55%         { transform: translateY(0); }
  }
  @keyframes hc-dj-la {
    0%,100%     { transform: rotate(0deg); }
    10%         { transform: rotate(-50deg); }
    22%         { transform: rotate(0deg); }
    35%         { transform: rotate(-70deg); }
    53%         { transform: rotate(10deg); }
    58%         { transform: rotate(0deg); }
  }
  @keyframes hc-dj-ra {
    0%,100%     { transform: rotate(0deg); }
    10%         { transform: rotate(50deg); }
    22%         { transform: rotate(0deg); }
    35%         { transform: rotate(70deg); }
    53%         { transform: rotate(-10deg); }
    58%         { transform: rotate(0deg); }
  }
  @keyframes hc-dj-ey {
    /* scrunch on hops */
    0%,100%     { transform: scaleY(1); }
    10%,15%     { transform: scaleY(0.3); }
    22%         { transform: scaleY(1); }
    35%,45%     { transform: scaleY(0.2); }
    53%         { transform: scaleY(1); }
  }
  @keyframes hc-dj-squash {
    /* landing squash */
    0%,100%     { transform: scaleY(1) scaleX(1); }
    21%,23%     { transform: scaleY(0.85) scaleX(1.15); }
    27%         { transform: scaleY(1) scaleX(1); }
    52%,54%     { transform: scaleY(0.78) scaleX(1.22); }
    59%         { transform: scaleY(1) scaleX(1); }
  }
  @keyframes hc-dj-shad {
    0%,100%     { transform: scaleX(1); opacity: 0.15; }
    12%         { transform: scaleX(0.7); opacity: 0.08; }
    22%         { transform: scaleX(1); opacity: 0.15; }
    37%         { transform: scaleX(0.4); opacity: 0.05; }
    53%         { transform: scaleX(1.15); opacity: 0.18; }
    55%         { transform: scaleX(1); opacity: 0.15; }
  }
</style>

<!-- shadow -->
<rect class="hc-dj-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.15"/>

<!-- hop wrapper -->
<g class="hc-dj-wrap">

  <!-- torso squash -->
  <g class="hc-dj-torso">
    <rect x="2"  y="6"  width="11" height="7" fill="#DE886D"/>
    <rect x="3"  y="13" width="1"  height="2" fill="#DE886D"/>
    <rect x="5"  y="13" width="1"  height="2" fill="#DE886D"/>
    <rect x="9"  y="13" width="1"  height="2" fill="#DE886D"/>
    <rect x="11" y="13" width="1"  height="2" fill="#DE886D"/>
  </g>

  <!-- left arm -->
  <g class="hc-dj-larm">
    <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
  </g>

  <!-- right arm -->
  <g class="hc-dj-rarm">
    <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
  </g>

  <!-- eyes scrunch -->
  <g class="hc-dj-eyes">
    <rect x="4"  y="8" width="1" height="2" fill="#000"/>
    <rect x="10" y="8" width="1" height="2" fill="#000"/>
  </g>

</g>
</svg>
