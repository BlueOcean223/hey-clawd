<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* ===== Mini Enter Sleep: 3.2s one-shot DND entry ===== */
      /*
        0%-30%   Slide in from right (same bounce as mini-enter)
        30%-50%  Arm gently extends out (no waving, sleepy)
        Eyes stay closed the entire time (DND = sleeping)
        50%-100% Settle into sleep pose
      */

      /* Body slide: same cubic-bezier overshoot as mini-enter */
      #body-js {
        animation: body-enter 3.2s cubic-bezier(0.22, 1, 0.36, 1) 1 forwards;
      }

      /* Left arm: hidden during slide, extends gently (no wave) */
      #left-arm {
        transform-origin: 2px 9px;
        animation: arm-enter-sleep 3.2s ease-in-out 1 forwards;
      }

      /* ===== Keyframes ===== */
      @keyframes body-enter {
        0%           { transform: translate(25px, 0); }
        18%          { transform: translate(-3px, -0.8px); }
        24%          { transform: translate(1.4px, 0.4px); }
        30%, 100%    { transform: translate(0, 0); }
      }

      /* Arm extends out gently, no waving */
      @keyframes arm-enter-sleep {
        0%, 30%   { transform: scaleX(0.05) rotate(0deg); }
        50%, 100% { transform: scaleX(1) rotate(0deg); }
      }
    </style>
  </defs>

  <!-- No shadow (mini mode) -->

  <!-- Layer 2: Body (animated slide-in wraps everything) -->
  <g id="body-js">
    <!-- Tilt -12deg (mini mode) -->
    <g transform="rotate(-12, 7.5, 15)">

      <!-- Legs (inside tilt but static) -->
      <g fill="#DE886D">
        <rect x="3" y="11" width="1" height="4"/>
        <rect x="5" y="11" width="1" height="4"/>
        <rect x="9" y="11" width="1" height="4"/>
        <rect x="11" y="11" width="1" height="4"/>
      </g>

      <!-- Left Arm (extended, gentle extend only) -->
      <rect id="left-arm" x="-1.5" y="9" width="4.5" height="2" fill="#DE886D"/>

      <!-- Torso -->
      <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>

      <!-- Right Arm -->
      <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>

      <!-- Eyes: closed (wide dashes, sleeping pose) -->
      <g id="eyes-js" fill="#000000">
        <rect x="3.5" y="8.8" width="2" height="0.4"/>
        <rect x="9.5" y="8.8" width="2" height="0.4"/>
      </g>
    </g>
  </g>
</svg>
