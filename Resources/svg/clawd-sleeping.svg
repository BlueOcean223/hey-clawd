<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <!-- Pixel Art Z shapes for Zzz particles -->
    <g id="pixel-z">
      <rect x="0" y="0" width="4" height="1"/>
      <rect x="2" y="1" width="1" height="1"/>
      <rect x="1" y="2" width="1" height="1"/>
      <rect x="0" y="3" width="4" height="1"/>
    </g>
    <g id="pixel-z-sm">
      <rect x="0" y="0" width="3" height="1"/>
      <rect x="1" y="1" width="1" height="1"/>
      <rect x="0" y="2" width="3" height="1"/>
    </g>

    <style>
      /* ===== clawd-sleeping.svg =====
         4.5s breathing loop. Splooted flat pose.
         Zzz particles (3, staggered, winding paths).
         Slow breathing scale(1.02, 1.25). Eyes as horizontal dashes.

         Splooted pose (static base):
         - torso: scale(1.18, 0.71) translate(-1px, 4px)
         - legs: scaleY(0.33) (stubs)
         - arms: translate(+/-1px, 4px) flat on ground
         - eyes: wide thin dashes at lowered position

         This pose = collapse end pose = wake start pose */

      /* ===== 1. Breathing loop ===== */

      .sleep-breathe {
        transform-origin: 7.5px 15px;
        animation: sleep-breathe 4.5s infinite ease-in-out;
      }

      /* ===== 2. Shadow ===== */

      .shadow-breathe {
        transform-origin: 7.5px 15.5px;
        animation: shadow-breathe 4.5s infinite ease-in-out;
      }

      /* ===== 3. Zzz particles ===== */

      .z-particle { opacity: 0; }
      .z1 { animation: float-z1 6s infinite ease-in-out; animation-delay: 0s; }
      .z2 { animation: float-z2 6s infinite ease-in-out; animation-delay: -2s; }
      .z3 { animation: float-z3 6s infinite ease-in-out; animation-delay: -4s; }

      /* ===== Keyframes ===== */

      /* Breathing: slow inhale -> hold -> exhale -> pause
         scale(1.02, 1.25) at peak — chest inflates upward from floor */
      @keyframes sleep-breathe {
        0%, 20%   { transform: scale(1, 1); }
        28%       { transform: scale(1.005, 1.06); }
        35%, 45%  { transform: scale(1.02, 1.25); }   /* full inhale hold */
        55%       { transform: scale(1.01, 1.12); }
        68%       { transform: scale(1.003, 1.03); }
        80%, 100% { transform: scale(1, 1); }          /* exhale rest */
      }

      /* Shadow tracks breathing */
      @keyframes shadow-breathe {
        0%, 20%   { transform: scaleX(1); opacity: 0.4; }
        28%       { transform: scaleX(1.01); opacity: 0.42; }
        35%, 45%  { transform: scaleX(1.05); opacity: 0.5; }
        55%       { transform: scaleX(1.03); opacity: 0.46; }
        68%       { transform: scaleX(1.01); opacity: 0.42; }
        80%, 100% { transform: scaleX(1); opacity: 0.4; }
      }

      /* Zzz float paths — winding sinusoidal, each unique */
      @keyframes float-z1 {
        0%   { transform: translate(5px, 8px) scale(0.4); opacity: 0; }
        8%   { opacity: 0.9; }
        20%  { transform: translate(8px, 5px) scale(0.55); }
        35%  { transform: translate(5px, 2px) scale(0.7); }
        50%  { transform: translate(9px, -1px) scale(0.85); opacity: 1; }
        65%  { transform: translate(5px, -4px) scale(0.95); }
        80%  { transform: translate(8px, -7px) scale(1.05); opacity: 0.6; }
        92%  { transform: translate(6px, -9px) scale(1.1); opacity: 0.2; }
        100% { transform: translate(7px, -10px) scale(1.12); opacity: 0; }
      }

      @keyframes float-z2 {
        0%   { transform: translate(7px, 9px) scale(0.3); opacity: 0; }
        8%   { opacity: 0.85; }
        20%  { transform: translate(4px, 6px) scale(0.45); }
        35%  { transform: translate(8px, 3px) scale(0.6); }
        50%  { transform: translate(5px, 0px) scale(0.75); opacity: 1; }
        65%  { transform: translate(9px, -3px) scale(0.85); }
        80%  { transform: translate(6px, -6px) scale(0.95); opacity: 0.5; }
        92%  { transform: translate(8px, -8px) scale(1.0); opacity: 0.15; }
        100% { transform: translate(7px, -9px) scale(1.05); opacity: 0; }
      }

      @keyframes float-z3 {
        0%   { transform: translate(6px, 7px) scale(0.5); opacity: 0; }
        8%   { opacity: 0.8; }
        20%  { transform: translate(10px, 4px) scale(0.65); }
        35%  { transform: translate(6px, 1px) scale(0.8); }
        50%  { transform: translate(10px, -2px) scale(0.9); opacity: 1; }
        65%  { transform: translate(7px, -5px) scale(1.0); }
        80%  { transform: translate(10px, -8px) scale(1.1); opacity: 0.5; }
        92%  { transform: translate(8px, -10px) scale(1.15); opacity: 0.15; }
        100% { transform: translate(7px, -11px) scale(1.2); opacity: 0; }
      }
    </style>
  </defs>

  <!-- Layer 0: Shadow (wide for splooted posture) -->
  <rect class="shadow-breathe" x="-1" y="15" width="17" height="1" fill="#000000" opacity="0.4"/>

  <!-- Layer 1: Zzz particles -->
  <g>
    <use href="#pixel-z" class="z-particle z1" fill="#90A4AE"/>
    <use href="#pixel-z-sm" class="z-particle z2" fill="#B0BEC5"/>
    <use href="#pixel-z" class="z-particle z3" fill="#CFD8DC"/>
  </g>

  <!-- Layer 2: Splooted body with breathing -->
  <g class="sleep-breathe">
    <!-- Leg stubs (pointing up from behind, short) -->
    <g fill="#DE886D">
      <rect x="3" y="9" width="1" height="1"/>
      <rect x="5" y="9" width="1" height="1"/>
      <rect x="9" y="9" width="1" height="1"/>
      <rect x="11" y="9" width="1" height="1"/>
    </g>

    <!-- Squashed body resting on the floor -->
    <g fill="#DE886D">
      <!-- Flattened torso -->
      <rect x="1" y="10" width="13" height="5"/>
      <!-- Arms spread flat on ground -->
      <rect x="-1" y="13" width="2" height="2"/>
      <rect x="14" y="13" width="2" height="2"/>
    </g>

    <!-- Eyes as thin horizontal dashes -->
    <g fill="#000000">
      <rect x="3.5" y="12.5" width="2" height="0.4"/>
      <rect x="9.5" y="12.5" width="2" height="0.4"/>
    </g>
  </g>
</svg>
