<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <g id="pixel-z">
      <rect x="0" y="0" width="4" height="1"/>
      <rect x="2" y="1" width="1" height="1"/>
      <rect x="1" y="2" width="1" height="1"/>
      <rect x="0" y="3" width="4" height="1"/>
    </g>
    <g id="pixel-z-sm">
      <rect x="0" y="0" width="3" height="1"/>
      <rect x="1" y="1" width="1" height="1"/>
      <rect x="0" y="2" width="3" height="1"/>
    </g>

    <style>
      /* ===== 5s one-shot: lazy yawn, quick snap back, normal collapse =====
         0-5%:   anticipation
         5-38%:  lazy yawn (squint eyes, mouth, arms up)
         38-46%: quick snap back to neutral
         46-88%: normal pace collapse to splooted
         88-100%: settle */

      .rest-shadow-form {
        transform-origin: 7.5px 15.5px;
        animation: shadow-form 3.6s ease-in-out forwards;
      }
      @keyframes shadow-form {
        0%, 5%    { transform: scaleX(1); opacity: 0.5; }
        15%, 32%  { transform: scaleX(0.88); opacity: 0.42; }
        /* quick snap back */
        46%       { transform: scaleX(0.65); opacity: 0.50; }
        /* normal collapse */
        58%       { transform: scaleX(0.75); opacity: 0.47; }
        70%       { transform: scaleX(0.88); opacity: 0.44; }
        82%       { transform: scaleX(0.97); opacity: 0.41; }
        92%       { transform: scaleX(1.03); opacity: 0.39; }
        100%      { transform: scaleX(1.0); opacity: 0.40; }
      }

      .rest-body-frame {
        transform-origin: 7.5px 13px;
        animation: body-frame 3.6s ease-in-out forwards;
      }
      @keyframes body-frame {
        0%, 4%    { transform: scale(1, 1) translate(0, 0); }
        8%        { transform: scale(1.01, 0.99) translate(0, 0.1px); }
        15%, 32%  { transform: scale(0.97, 1.07) translate(0, -0.8px); }
        /* quick snap back */
        42%       { transform: scale(1.01, 0.99) translate(0, 0.2px); }
        46%       { transform: scale(1.05, 0.95) translate(0, 1px); }
        /* normal collapse */
        54%       { transform: scale(1.065, 0.935) translate(0, 1.2px); }
        64%       { transform: scale(1.08, 0.9) translate(0, 1.5px); }
        76%       { transform: scale(1.1, 0.84) translate(0, 1.95px); }
        86%       { transform: scale(1.05, 0.9) translate(0, 1.05px); }
        94%       { transform: scale(1.01, 0.98) translate(0, 0.22px); }
        100%      { transform: scale(1, 1) translate(0, 0); }
      }

      .rest-torso {
        transform-origin: 2px 6px;
        animation: torso-col 3.6s ease-in-out forwards;
      }
      @keyframes torso-col {
        0%, 46%   { transform: translate(0, 0) scale(1, 1); }
        58%       { transform: translate(-0.15px, 0.7px) scale(1.03, 0.95); }
        70%       { transform: translate(-0.4px, 1.8px) scale(1.07, 0.88); }
        82%       { transform: translate(-0.8px, 3.1px) scale(1.14, 0.8); }
        92%       { transform: translate(-1.05px, 3.95px) scale(1.19, 0.72); }
        100%      { transform: translate(-1px, 4px) scale(1.18, 0.71); }
      }

      .rest-arm-l {
        transform-origin: 2px 10px;
        animation: arm-l-col 3.6s ease-in-out forwards;
      }
      @keyframes arm-l-col {
        0%, 4%    { transform: translate(0, 0) rotate(0deg); }
        12%       { transform: translate(-0.5px, -1px) rotate(-18deg); }
        18%, 32%  { transform: translate(-1px, -2px) rotate(-35deg); }
        /* quick snap back */
        42%       { transform: translate(-0.2px, -0.3px) rotate(-5deg); }
        46%       { transform: translate(0, 0.5px) rotate(-3deg); }
        /* collapse */
        58%       { transform: translate(-0.15px, 1.5px) rotate(-2deg); }
        70%       { transform: translate(-0.4px, 2.4px) rotate(-1deg); }
        82%       { transform: translate(-0.8px, 3.35px) rotate(0deg); }
        92%       { transform: translate(-1.05px, 4.05px) rotate(0deg); }
        100%      { transform: translate(-1px, 4px) rotate(0deg); }
      }

      .rest-arm-r {
        transform-origin: 13px 10px;
        animation: arm-r-col 3.6s ease-in-out forwards;
      }
      @keyframes arm-r-col {
        0%, 4%    { transform: translate(0, 0) rotate(0deg); }
        12%       { transform: translate(0.5px, -1px) rotate(18deg); }
        18%, 32%  { transform: translate(1px, -2px) rotate(35deg); }
        42%       { transform: translate(0.2px, -0.3px) rotate(5deg); }
        46%       { transform: translate(0, 0.5px) rotate(3deg); }
        58%       { transform: translate(0.15px, 1.5px) rotate(2deg); }
        70%       { transform: translate(0.4px, 2.4px) rotate(1deg); }
        82%       { transform: translate(0.8px, 3.35px) rotate(0deg); }
        92%       { transform: translate(1.05px, 4.05px) rotate(0deg); }
        100%      { transform: translate(1px, 4px) rotate(0deg); }
      }

      /* Eyes: squint "- -" during yawn, brief fight, then shut */
      .rest-eye-l {
        transform-origin: 4px 8px;
        animation: eye-l-col 3.6s ease-in-out forwards;
      }
      @keyframes eye-l-col {
        0%, 4%    { transform: scale(1, 1); }
        10%       { transform: scale(1, 0.4); }
        14%, 32%  { transform: scale(1, 0.15); }
        /* snap back: briefly fight drowsiness */
        38%       { transform: scale(1, 0.3); }
        42%       { transform: scale(1, 0.1); }
        /* stay shut, drift to sleep dashes */
        60%       { transform: translate(-0.05px, 0.8px) scale(1.15, 0.1); }
        76%       { transform: translate(-0.2px, 2.5px) scale(1.5, 0.13); }
        88%       { transform: translate(-0.4px, 4px) scale(1.85, 0.18); }
        100%      { transform: translate(-0.5px, 4.5px) scale(2, 0.2); }
      }

      .rest-eye-r {
        transform-origin: 10px 8px;
        animation: eye-r-col 3.6s ease-in-out forwards;
      }
      @keyframes eye-r-col {
        0%, 4%    { transform: scale(1, 1); }
        10%       { transform: scale(1, 0.4); }
        14%, 32%  { transform: scale(1, 0.15); }
        38%       { transform: scale(1, 0.3); }
        42%       { transform: scale(1, 0.1); }
        60%       { transform: translate(-0.05px, 0.8px) scale(1.15, 0.1); }
        76%       { transform: translate(-0.2px, 2.5px) scale(1.5, 0.13); }
        88%       { transform: translate(-0.4px, 4px) scale(1.85, 0.18); }
        100%      { transform: translate(-0.5px, 4.5px) scale(2, 0.2); }
      }

      .rest-leg { animation: leg-col 3.6s ease-in-out forwards; }
      .leg-ol { transform-origin: 3px 12px; }
      .leg-il { transform-origin: 5px 12px; }
      .leg-ir { transform-origin: 9px 12px; }
      .leg-or { transform-origin: 11px 12px; }
      @keyframes leg-col {
        0%, 46%   { transform: translate(0, 0) scale(1, 1); }
        58%       { transform: translate(0, -0.2px) scale(1, 0.9); }
        70%       { transform: translate(0, -0.7px) scale(1, 0.75); }
        82%       { transform: translate(0, -1.6px) scale(1, 0.52); }
        92%       { transform: translate(0, -2.7px) scale(1, 0.36); }
        100%      { transform: translate(0, -3px) scale(1, 0.33); }
      }

      .rest-mouth {
        opacity: 0;
        animation: mouth-yawn 3.6s ease-in-out forwards;
      }
      @keyframes mouth-yawn {
        0%, 7%    { opacity: 0; }
        12%       { opacity: 0.5; }
        16%, 30%  { opacity: 1; }
        36%       { opacity: 0.4; }
        40%, 100% { opacity: 0; }
      }

      /* ===== Sleep breathing (4.5s loop, starts after collapse) ===== */

      .rest-breathe {
        transform-origin: 7.5px 15px;
        animation: sleep-breathe 4.5s infinite ease-in-out 3.6s;
      }
      @keyframes sleep-breathe {
        0%, 25%, 100% { transform: scale(1, 1); }
        35%, 45%      { transform: scale(1.02, 1.25); }
      }

      .rest-shadow-breathe {
        transform-origin: 7.5px 15.5px;
        animation: shadow-breathe 4.5s infinite ease-in-out 3.6s;
      }
      @keyframes shadow-breathe {
        0%, 25%, 100% { transform: scaleX(1); opacity: 0.4; }
        35%, 45%      { transform: scaleX(1.05); opacity: 0.5; }
      }

      /* ===== Zzz particles (6s loop, staggered) ===== */

      .z-particle { opacity: 0; }
      .z1 { animation: float-z1 6s infinite ease-in-out 3.6s; }
      .z2 { animation: float-z2 6s infinite ease-in-out 5.6s; }
      .z3 { animation: float-z3 6s infinite ease-in-out 7.6s; }

      @keyframes float-z1 {
        0%   { transform: translate(5px, 8px) scale(0.4); opacity: 0; }
        10%  { opacity: 1; }
        30%  { transform: translate(9px, 4px) scale(0.6); }
        50%  { transform: translate(4px, 0px) scale(0.8); }
        70%  { transform: translate(8px, -4px) scale(1.0); }
        90%  { opacity: 0.8; }
        100% { transform: translate(6px, -8px) scale(1.1); opacity: 0; }
      }
      @keyframes float-z2 {
        0%   { transform: translate(8px, 9px) scale(0.3); opacity: 0; }
        10%  { opacity: 1; }
        30%  { transform: translate(5px, 5px) scale(0.5); }
        50%  { transform: translate(9px, 1px) scale(0.7); }
        70%  { transform: translate(6px, -3px) scale(0.9); }
        90%  { opacity: 0.8; }
        100% { transform: translate(8px, -7px) scale(1.0); opacity: 0; }
      }
      @keyframes float-z3 {
        0%   { transform: translate(6px, 7px) scale(0.5); opacity: 0; }
        10%  { opacity: 1; }
        30%  { transform: translate(10px, 3px) scale(0.7); }
        50%  { transform: translate(5px, -1px) scale(0.9); }
        70%  { transform: translate(9px, -5px) scale(1.1); }
        90%  { opacity: 0.8; }
        100% { transform: translate(6px, -9px) scale(1.2); opacity: 0; }
      }
    </style>
  </defs>

  <!-- Layer 0: Shadow -->
  <g class="rest-shadow-breathe">
    <rect class="rest-shadow-form" x="-1" y="15" width="17" height="1" fill="#000" opacity="0.4"/>
  </g>

  <!-- Layer 1: Zzz particles -->
  <use href="#pixel-z" class="z-particle z1" fill="#90A4AE"/>
  <use href="#pixel-z-sm" class="z-particle z2" fill="#B0BEC5"/>
  <use href="#pixel-z" class="z-particle z3" fill="#CFD8DC"/>

  <!-- Layer 2+3: Body -->
  <g class="rest-breathe">
    <g fill="#DE886D">
      <rect class="rest-leg leg-ol" x="3" y="12" width="1" height="3"/>
      <rect class="rest-leg leg-il" x="5" y="12" width="1" height="3"/>
      <rect class="rest-leg leg-ir" x="9" y="12" width="1" height="3"/>
      <rect class="rest-leg leg-or" x="11" y="12" width="1" height="3"/>
    </g>

    <g class="rest-body-frame">
      <rect class="rest-torso" x="2" y="6" width="11" height="7" fill="#DE886D"/>

      <g class="rest-mouth">
        <rect x="6" y="11" width="3" height="2" fill="#8B4513"/>
      </g>

      <g class="rest-arm-l">
        <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
      </g>
      <g class="rest-arm-r">
        <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
      </g>
      <g fill="#000">
        <rect class="rest-eye-l" x="4" y="8" width="1" height="2"/>
        <rect class="rest-eye-r" x="10" y="8" width="1" height="2"/>
      </g>
    </g>
  </g>
</svg>
