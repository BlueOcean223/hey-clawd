<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* ===== 1. Sub-animations (breathe, blink) ===== */
      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      .eyes-blink {
        transform-origin: 7.5px 9px;
        animation: crab-eyes 5s infinite ease-in-out;
      }

      /* ===== 2. Main timeline: 6s sideways walk ===== */
      /*
        Entire character sways right 0->8px over 3s, then back.
        Body bobs up/down 0.8s. Legs alternate stepping 0.4s.
        Eyes look right (toward destination), occasionally glance back + blink.
      */

      .crab-sway {
        animation: crab-sway 6s ease-in-out infinite;
      }

      /* ===== 3. Limb animations ===== */
      .arm-swing {
        transform-origin: 2px 9px;
        animation: arm-swing 6s ease-in-out infinite;
      }

      .leg-a {
        animation: step-a 0.4s ease-in-out infinite;
      }

      .leg-b {
        animation: step-b 0.4s ease-in-out infinite;
      }

      /* ===== Keyframes ===== */
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50%      { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }

      @keyframes crab-sway {
        0%, 100% { transform: translateX(0); }
        50%      { transform: translateX(8px); }
      }

      @keyframes step-a {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-1px); }
      }

      @keyframes step-b {
        0%, 100% { transform: translateY(-1px); }
        50%      { transform: translateY(0); }
      }

      @keyframes arm-swing {
        0%, 100% { transform: rotate(0deg); }
        25%      { transform: rotate(20deg); }
        75%      { transform: rotate(-10deg); }
      }

      /* Eyes: look right, occasionally glance back + blink */
      @keyframes crab-eyes {
        0%, 55%   { transform: translateX(2px) scaleY(1); }
        62%       { transform: translateX(0) scaleY(1); }
        66%       { transform: translateX(0) scaleY(0.1); }
        70%       { transform: translateX(0) scaleY(1); }
        75%       { transform: translateX(0) scaleY(0.1); }
        80%, 85%  { transform: translateX(0) scaleY(1); }
        92%, 100% { transform: translateX(2px) scaleY(1); }
      }
    </style>
  </defs>

  <!-- No shadow (mini mode) -->

  <!-- Entire character tilted -12deg (mini mode) -->
  <g transform="rotate(-12, 7.5, 15)">

    <g class="crab-sway">

      <!-- Layer 1: Legs (independent, alternating step) -->
      <g fill="#DE886D">
        <g class="leg-a">
          <rect x="3" y="11" width="1" height="4"/>
          <rect x="9" y="11" width="1" height="4"/>
        </g>
        <g class="leg-b">
          <rect x="5" y="11" width="1" height="4"/>
          <rect x="11" y="11" width="1" height="4"/>
        </g>
      </g>

      <!-- Layer 2: Upper Body -->
      <g class="breathe-anim">
        <!-- Torso -->
        <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>

        <!-- Left Arm (extended, swinging) -->
        <g class="arm-swing">
          <rect x="-1.5" y="9" width="4.5" height="2" fill="#DE886D"/>
        </g>

        <!-- Right Arm -->
        <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>

        <!-- Eyes: look right + blink -->
        <g class="eyes-blink" fill="#000000">
          <rect x="4" y="8" width="1" height="2"/>
          <rect x="10" y="8" width="1" height="2"/>
        </g>
      </g>

    </g>

  </g>
</svg>
