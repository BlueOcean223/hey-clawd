<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* ===== Ultrathink: meditative deep-thought with rainbow aura ===== */
      /*
        16s main cycle (5 × 3.2s breathe). No JS eye tracking.
        Body + legs float together (4s). Rainbow orbiting particles.
        Eyes half-closed with REM flutter. Rainbow halo above head.
      */

      /* ===== 1. Sub-animations ===== */
      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      .eyes-rem {
        transform-origin: 7.5px 9px;
        animation: eye-rem 16s infinite ease-in-out;
      }

      /* ===== 2. Main timeline: levitation (wraps entire character) ===== */
      .levitate {
        animation: levitate 4s infinite ease-in-out;
      }

      /* ===== 3. Component animations ===== */
      .arm-l {
        transform-origin: 2px 10px;
        animation: arm-l-drift 6.4s infinite ease-in-out;
      }

      .arm-r {
        transform-origin: 13px 10px;
        animation: arm-r-rest 9.6s infinite ease-in-out;
      }

      /* ===== 4. Effect animations ===== */

      /* Ground glow: rainbow color cycle, anti-phase with halo */
      .ground-glow {
        transform-origin: 7.5px 15.5px;
        animation: glow-ground 3s infinite ease-in-out, glow-color 6s infinite linear;
      }

      /* Head halo: rainbow color cycling diamond */
      .halo {
        transform-origin: 7.5px 2px;
        animation: halo-pulse 3s infinite ease-in-out;
      }
      .halo-color {
        animation: halo-color-cycle 4s infinite linear;
      }

      /* Rainbow orbiting particles — 6 colors cycling */
      .orb { opacity: 0.8; }
      .orb1 { animation: orbit1 8s linear infinite; }
      .orb2 { animation: orbit2 10s linear infinite; animation-delay: -3s; }
      .orb3 { animation: orbit3 12s linear infinite; animation-delay: -5s; }
      .orb4 { animation: orbit4 9s linear infinite; animation-delay: -2s; }
      .orb5 { animation: orbit5 11s linear infinite; animation-delay: -7s; }
      .orb6 { animation: orbit6 8.5s linear infinite; animation-delay: -4s; }

      /* Inspiration sparks (rainbow flash) */
      .spark1 { opacity: 0; animation: spark-r 16s infinite step-end; }
      .spark2 { opacity: 0; animation: spark-l 16s infinite step-end; }

      /* Rainbow shimmer on body — very subtle color wash (no blend mode) */
      .body-shimmer {
        animation: shimmer 8s infinite linear;
      }

      /* ===== Keyframes ===== */

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50%      { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }

      @keyframes levitate {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-2px); }
      }

      @keyframes eye-rem {
        0%, 24%   { transform: scaleY(0.3); }
        27%       { transform: scaleY(0.6); }
        30%, 59%  { transform: scaleY(0.3); }
        62%       { transform: scaleY(0.8); }
        66%, 100% { transform: scaleY(0.3); }
      }

      @keyframes arm-l-drift {
        0%, 100% { transform: rotate(0deg); }
        50%      { transform: rotate(-5deg) translate(0, -0.5px); }
      }

      @keyframes arm-r-rest {
        0%, 100% { transform: rotate(0deg); }
        50%      { transform: rotate(2deg); }
      }

      /* Ground glow: breathe opacity */
      @keyframes glow-ground {
        0%, 100% { opacity: 0.35; transform: scaleX(1.05); }
        50%      { opacity: 0.15; transform: scaleX(0.95); }
      }

      /* Ground glow: rainbow color cycle */
      @keyframes glow-color {
        0%       { fill: #FF5252; }
        16.6%    { fill: #FF9800; }
        33.3%    { fill: #FFC107; }
        50%      { fill: #4CAF50; }
        66.6%    { fill: #2196F3; }
        83.3%    { fill: #9C27B0; }
        100%     { fill: #FF5252; }
      }

      /* Halo pulse */
      @keyframes halo-pulse {
        0%, 100% { opacity: 0.25; }
        50%      { opacity: 0.75; }
      }

      /* Halo color cycle — offset from ground */
      @keyframes halo-color-cycle {
        0%       { fill: #2196F3; }
        16.6%    { fill: #9C27B0; }
        33.3%    { fill: #FF5252; }
        50%      { fill: #FF9800; }
        66.6%    { fill: #FFC107; }
        83.3%    { fill: #4CAF50; }
        100%     { fill: #2196F3; }
      }

      /* Orbiting particles — elliptical paths */
      @keyframes orbit1 {
        0%   { transform: translate(10px, 0px); }
        25%  { transform: translate(0px, -8px); }
        50%  { transform: translate(-10px, 0px); }
        75%  { transform: translate(0px, 8px); }
        100% { transform: translate(10px, 0px); }
      }
      @keyframes orbit2 {
        0%   { transform: translate(-8px, -5px); }
        25%  { transform: translate(6px, -10px); }
        50%  { transform: translate(8px, 5px); }
        75%  { transform: translate(-6px, 10px); }
        100% { transform: translate(-8px, -5px); }
      }
      @keyframes orbit3 {
        0%   { transform: translate(5px, 9px); }
        25%  { transform: translate(12px, -2px); }
        50%  { transform: translate(-5px, -9px); }
        75%  { transform: translate(-12px, 2px); }
        100% { transform: translate(5px, 9px); }
      }
      @keyframes orbit4 {
        0%   { transform: translate(-11px, 3px); }
        25%  { transform: translate(-3px, -9px); }
        50%  { transform: translate(11px, -3px); }
        75%  { transform: translate(3px, 9px); }
        100% { transform: translate(-11px, 3px); }
      }
      @keyframes orbit5 {
        0%   { transform: translate(7px, -7px); }
        25%  { transform: translate(-9px, -4px); }
        50%  { transform: translate(-7px, 7px); }
        75%  { transform: translate(9px, 4px); }
        100% { transform: translate(7px, -7px); }
      }
      @keyframes orbit6 {
        0%   { transform: translate(-6px, -8px); }
        25%  { transform: translate(8px, -3px); }
        50%  { transform: translate(6px, 8px); }
        75%  { transform: translate(-8px, 3px); }
        100% { transform: translate(-6px, -8px); }
      }

      /* Spark flashes */
      @keyframes spark-r {
        0%, 40%   { opacity: 0; }
        41%, 42%  { opacity: 1; }
        43%, 44%  { opacity: 0; }
        44%, 45%  { opacity: 0.6; }
        46%, 100% { opacity: 0; }
      }
      @keyframes spark-l {
        0%, 75%   { opacity: 0; }
        76%, 77%  { opacity: 1; }
        78%, 79%  { opacity: 0; }
        79%, 80%  { opacity: 0.6; }
        81%, 100% { opacity: 0; }
      }

      /* Subtle body shimmer overlay (lowered opacity, no blend mode) */
      @keyframes shimmer {
        0%       { fill: #FF5252; opacity: 0.04; }
        16.6%    { fill: #FF9800; opacity: 0.05; }
        33.3%    { fill: #FFC107; opacity: 0.04; }
        50%      { fill: #4CAF50; opacity: 0.05; }
        66.6%    { fill: #2196F3; opacity: 0.04; }
        83.3%    { fill: #9C27B0; opacity: 0.05; }
        100%     { fill: #FF5252; opacity: 0.04; }
      }
    </style>
  </defs>

  <!-- Layer 0: Ground glow (rainbow cycling energy projection) -->
  <rect class="ground-glow" x="2" y="15" width="11" height="1" fill="#2196F3" opacity="0.25"/>

  <!-- Levitate wrapper: body + legs float together -->
  <g class="levitate">

    <!-- Layer 1: Legs -->
    <g id="legs" fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/>
      <rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/>
      <rect x="11" y="13" width="1" height="2"/>
    </g>

    <!-- Layer 2: Body (breathe > torso + arms + eyes) -->
    <g class="breathe-anim">
      <!-- Torso -->
      <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>

      <!-- Rainbow shimmer overlay on body -->
      <rect class="body-shimmer" x="2" y="6" width="11" height="7" fill="#FF5252" opacity="0.04"/>

      <!-- Left arm -->
      <g class="arm-l">
        <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
      </g>

      <!-- Right arm -->
      <g class="arm-r">
        <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
      </g>

      <!-- Eyes: half-closed with REM flutter -->
      <g class="eyes-rem" fill="#000">
        <rect x="4" y="8" width="1" height="2"/>
        <rect x="10" y="8" width="1" height="2"/>
      </g>
    </g>

  </g>

  <!-- Layer 3: Effects -->

  <!-- Head halo: pixel diamond with rainbow color cycling -->
  <g class="halo levitate">
    <g class="halo-color" fill="#2196F3">
      <rect x="7" y="1" width="1" height="1"/>
      <rect x="6" y="2" width="1" height="1"/>
      <rect x="8" y="2" width="1" height="1"/>
      <rect x="7" y="3" width="1" height="1"/>
    </g>
  </g>

  <!-- Rainbow orbiting particles (6 colors = full spectrum) -->
  <rect class="orb orb1" x="7" y="9" width="1" height="1" fill="#FF5252"/>
  <rect class="orb orb2" x="7" y="9" width="1" height="1" fill="#FF9800"/>
  <rect class="orb orb3" x="7" y="9" width="1" height="1" fill="#FFC107"/>
  <rect class="orb orb4" x="7" y="9" width="1" height="1" fill="#4CAF50"/>
  <rect class="orb orb5" x="7" y="9" width="1" height="1" fill="#2196F3"/>
  <rect class="orb orb6" x="7" y="9" width="1" height="1" fill="#9C27B0"/>

  <!-- Inspiration spark #1: rainbow cross, right-upper -->
  <g class="spark1">
    <rect x="17" y="-2" width="1" height="1" fill="#FF5252"/>
    <rect x="17" y="-1" width="1" height="1" fill="#FFC107"/>
    <rect x="17" y="0" width="1" height="1" fill="#4CAF50"/>
    <rect x="16" y="-1" width="1" height="1" fill="#2196F3"/>
    <rect x="18" y="-1" width="1" height="1" fill="#9C27B0"/>
  </g>

  <!-- Inspiration spark #2: rainbow cross, left-upper -->
  <g class="spark2">
    <rect x="-4" y="0" width="1" height="1" fill="#9C27B0"/>
    <rect x="-4" y="1" width="1" height="1" fill="#2196F3"/>
    <rect x="-4" y="2" width="1" height="1" fill="#4CAF50"/>
    <rect x="-5" y="1" width="1" height="1" fill="#FF9800"/>
    <rect x="-3" y="1" width="1" height="1" fill="#FF5252"/>
  </g>
</svg>
