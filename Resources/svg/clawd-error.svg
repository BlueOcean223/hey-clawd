<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
  <style>
    .hc-body { animation: hc-shake 2.5s infinite; transform-origin: 7.5px 15px; }
    .hc-l-arm { transform-origin: 2px 10px; animation: hc-arms-up 2.5s infinite; }
    .hc-r-arm { transform-origin: 13px 10px; animation: hc-arms-up 2.5s infinite; }
    .hc-smoke { fill: #555; opacity: 0; animation: hc-smoke-puff 2.5s infinite; }
    .hc-exclamation { fill: #FF0000; opacity: 0; animation: hc-alert-up 2.5s infinite; }
    
    @keyframes hc-shake {
      0%, 20% { transform: translateX(0); }
      2%, 6%, 10%, 14%, 18% { transform: translateX(-2px); }
      4%, 8%, 12%, 16% { transform: translateX(2px); }
      22%, 100% { transform: translate(0, 0.5px); } /* Tense tremble base */
      25%, 35%, 45%, 55%, 65%, 75%, 85%, 95% { transform: translate(0.2px, 0.5px); }
      30%, 40%, 50%, 60%, 70%, 80%, 90% { transform: translate(-0.2px, 0.5px); }
    }
    
    @keyframes hc-arms-up {
      0%, 20% { transform: rotate(0); }
      25%, 100% { transform: rotate(-45deg); } /* L-arm up, R-arm is mirrored by transform-origin logic below */
    }
    
    @keyframes hc-smoke-puff {
      22% { opacity: 0; transform: translateY(0) scale(1); }
      35% { opacity: 0.8; transform: translateY(-5px) scale(1.5); }
      50% { opacity: 0; transform: translateY(-10px) scale(2); }
    }
    
    @keyframes hc-alert-up {
      0%, 5% { opacity: 0; transform: translateY(0); }
      10%, 40% { opacity: 1; transform: translateY(-5px); }
      45%, 100% { opacity: 0; transform: translateY(-10px); }
    }
  </style>
  
  <g class="hc-body">
    <rect x="3" y="15" width="9" height="1" fill="rgba(0,0,0,0.15)" />
    <rect x="3" y="13" width="1" height="2" fill="#DE886D" />
    <rect x="5" y="13" width="1" height="2" fill="#DE886D" />
    <rect x="9" y="13" width="1" height="2" fill="#DE886D" />
    <rect x="11" y="13" width="1" height="2" fill="#DE886D" />
    <rect x="2" y="6" width="11" height="7" fill="#DE886D" />
    <rect class="hc-l-arm" x="0" y="9" width="2" height="2" fill="#DE886D" />
    <g style="transform-origin: 13px 10px; animation: hc-arms-up-r 2.5s infinite;">
      <rect x="13" y="9" width="2" height="2" fill="#DE886D" />
    </g>
    <style>
      @keyframes hc-arms-up-r { 0%, 20% { transform: rotate(0); } 25%, 100% { transform: rotate(45deg); } }
    </style>
    <!-- X-eyes: clean vector × -->
    <g stroke="#000" stroke-width="0.9" stroke-linecap="round">
      <line x1="3.2" y1="7.2" x2="5.2" y2="9.2"/>
      <line x1="5.2" y1="7.2" x2="3.2" y2="9.2"/>
      <line x1="9.2" y1="7.2" x2="11.2" y2="9.2"/>
      <line x1="11.2" y1="7.2" x2="9.2" y2="9.2"/>
    </g>
  </g>
  
  <rect class="hc-smoke" x="5" y="2" width="2" height="2" />
  <rect class="hc-smoke" x="8" y="0" width="1" height="1" style="animation-delay: 0.2s;" />
  <rect class="hc-smoke" x="4" y="-2" width="1" height="1" style="animation-delay: 0.4s;" />
  
  <g class="hc-exclamation">
    <rect x="7" y="-5" width="1" height="3" />
    <rect x="7" y="-1" width="1" height="1" />
  </g>
</svg>