<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* ===== clawd-idle-yawn.svg =====
         3.8s one-shot (forwards). Body stretches up, mouth opens,
         eyes shut, arms spread, tear drop falls.
         End pose: body scale(1.05,0.95), eyes scaleY(0.1),
         arms rotate(+/-15deg) — matches doze/collapse start. */

      /* ===== 1. Sub-animations ===== */

      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      /* ===== 2. Main timeline ===== */

      .action-body {
        transform-origin: 7.5px 13px;
        animation: action-body-yawn 3.8s ease-in-out forwards;
        animation-iteration-count: 1;
      }

      /* ===== 3. Part animations ===== */

      .arm-l {
        transform-origin: 2px 10px;
        animation: arm-l-yawn 3.8s ease-in-out forwards;
        animation-iteration-count: 1;
      }

      .arm-r {
        transform-origin: 13px 10px;
        animation: arm-r-yawn 3.8s ease-in-out forwards;
        animation-iteration-count: 1;
      }

      .eyes-blink {
        transform-origin: 7.5px 9px;
        animation: eye-blink-yawn 3.8s ease-in-out forwards;
        animation-iteration-count: 1;
      }

      .yawn-mouth {
        transform-origin: 7.5px 11px;
        animation: yawn-mouth-anim 3.8s ease-in-out forwards;
        animation-iteration-count: 1;
        opacity: 0;
      }

      .yawn-tear {
        animation: tear-fall 3.8s ease-in forwards;
        animation-iteration-count: 1;
        opacity: 0;
      }

      /* ===== 4. Shadow ===== */

      .shadow-anim {
        transform-origin: 7.5px 15.5px;
        animation: shadow-yawn 3.8s ease-in-out forwards;
        animation-iteration-count: 1;
      }

      /* ===== Keyframes ===== */

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50%      { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }

      /* Body: neutral -> anticipation dip -> stretch up -> peak hold ->
         squash settle -> hold yawn-end pose
         7+ keyframe points for natural arc */
      @keyframes action-body-yawn {
        0%, 5%   { transform: scale(1, 1) translate(0, 0); }
        10%      { transform: scale(1.02, 0.97) translate(0, 0.5px); }     /* anticipation dip */
        18%      { transform: scale(0.97, 1.04) translate(0, -0.5px); }    /* begin stretch */
        30%      { transform: scale(0.93, 1.08) translate(0, -1.5px); }    /* stretching */
        42%, 52% { transform: scale(0.9, 1.12) translate(0, -2px); }       /* peak stretch hold */
        62%      { transform: scale(0.95, 1.04) translate(0, -0.5px); }    /* coming down */
        72%      { transform: scale(1.02, 0.96) translate(0, 0.8px); }     /* overshoot squash */
        80%      { transform: scale(1.06, 0.94) translate(0, 1.2px); }     /* settling */
        90%, 100% { transform: scale(1.05, 0.95) translate(0, 1px); }      /* END POSE */
      }

      @keyframes shadow-yawn {
        0%, 5%    { transform: scaleX(1); opacity: 0.5; }
        10%       { transform: scaleX(1.02); opacity: 0.51; }
        30%       { transform: scaleX(0.93); opacity: 0.44; }
        42%, 52%  { transform: scaleX(0.9); opacity: 0.4; }
        62%       { transform: scaleX(0.96); opacity: 0.46; }
        72%       { transform: scaleX(1.03); opacity: 0.52; }
        80%       { transform: scaleX(1.06); opacity: 0.55; }
        90%, 100% { transform: scaleX(1.05); opacity: 0.55; }
      }

      /* Eyes: open -> blink -> open -> shut for yawn -> stay shut at end */
      @keyframes eye-blink-yawn {
        0%, 8%    { transform: scaleY(1); }
        12%       { transform: scaleY(0.1); }       /* quick blink */
        16%, 24%  { transform: scaleY(1); }          /* open again */
        30%       { transform: scaleY(0.6); }         /* squinting */
        38%, 68%  { transform: scaleY(0.1); }         /* shut during yawn peak */
        74%       { transform: scaleY(0.3); }          /* flicker open */
        78%, 100% { transform: scaleY(0.1); }         /* END POSE: shut */
      }

      /* Left arm: neutral -> lift outward -> stretch wide -> relax down */
      @keyframes arm-l-yawn {
        0%, 8%    { transform: translate(0, 0) rotate(0deg); }
        14%       { transform: translate(0, 0.3px) rotate(3deg); }         /* anticipation */
        26%       { transform: translate(-0.5px, -1px) rotate(-25deg); }
        36%       { transform: translate(-1.5px, -2.5px) rotate(-55deg); }
        46%, 54%  { transform: translate(-2px, -3px) rotate(-80deg); }     /* peak stretch */
        64%       { transform: translate(-1px, -1.5px) rotate(-40deg); }   /* coming back */
        74%       { transform: translate(0, 0.5px) rotate(-8deg); }
        82%       { transform: translate(0, 1.2px) rotate(-18deg); }       /* overshoot past */
        90%, 100% { transform: translate(0, 1px) rotate(-15deg); }         /* END POSE */
      }

      /* Right arm: mirror of left with slight timing offset */
      @keyframes arm-r-yawn {
        0%, 8%    { transform: translate(0, 0) rotate(0deg); }
        14%       { transform: translate(0, 0.3px) rotate(-3deg); }
        28%       { transform: translate(0.5px, -1px) rotate(25deg); }     /* slightly delayed */
        38%       { transform: translate(1.5px, -2.5px) rotate(55deg); }
        48%, 56%  { transform: translate(2px, -3px) rotate(80deg); }       /* peak stretch */
        66%       { transform: translate(1px, -1.5px) rotate(40deg); }
        76%       { transform: translate(0, 0.5px) rotate(8deg); }
        84%       { transform: translate(0, 1.2px) rotate(18deg); }
        92%, 100% { transform: translate(0, 1px) rotate(15deg); }          /* END POSE */
      }

      /* Mouth: hidden -> scale in -> wide open -> close -> hidden */
      @keyframes yawn-mouth-anim {
        0%, 18%   { opacity: 0; transform: scale(0.1); }
        24%       { opacity: 0.6; transform: scale(0.3, 0.15); }
        32%       { opacity: 1; transform: scale(0.6, 0.4); }
        42%, 52%  { opacity: 1; transform: scale(1.1, 1.4); }              /* wide open */
        62%       { opacity: 1; transform: scale(0.8, 0.6); }
        70%       { opacity: 0.7; transform: scale(0.4, 0.2); }
        78%, 100% { opacity: 0; transform: scale(0.1); }
      }

      /* Tear: appears at peak, slides down, fades */
      @keyframes tear-fall {
        0%, 38%   { opacity: 0; transform: translate(0, 0); }
        44%       { opacity: 0.8; transform: translate(0, 0); }
        52%       { opacity: 1; transform: translate(0, 0.5px); }
        62%       { opacity: 1; transform: translate(0, 2px); }
        72%       { opacity: 0.6; transform: translate(0.3px, 3px); }
        80%       { opacity: 0.2; transform: translate(0.5px, 4px); }
        88%, 100% { opacity: 0; transform: translate(0.5px, 4.5px); }
      }
    </style>
  </defs>

  <!-- Layer 0: Shadow -->
  <rect class="shadow-anim" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>

  <!-- Layer 1: Legs (static, independent of body) -->
  <g id="legs" fill="#DE886D">
    <rect x="3" y="12" width="1" height="3"/>
    <rect x="5" y="12" width="1" height="3"/>
    <rect x="9" y="12" width="1" height="3"/>
    <rect x="11" y="12" width="1" height="3"/>
  </g>

  <!-- Layer 2: Upper Body -->
  <g class="action-body">
    <g class="breathe-anim">
      <!-- Torso -->
      <rect id="torso" x="2" y="6" width="11" height="7" fill="#DE886D"/>
      <!-- Left Arm -->
      <g class="arm-l">
        <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
      </g>
      <!-- Right Arm -->
      <g class="arm-r">
        <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
      </g>
      <!-- Yawn Mouth (hidden initially) -->
      <rect class="yawn-mouth" x="6" y="10" width="3" height="2" fill="#000000"/>
      <!-- Eyes -->
      <g class="eyes-blink" fill="#000000">
        <rect x="4" y="8" width="1" height="2"/>
        <rect x="10" y="8" width="1" height="2"/>
      </g>
      <!-- Tear -->
      <rect class="yawn-tear" x="3.5" y="10" width="1" height="1" fill="#40C4FF"/>
    </g>
  </g>
</svg>
