<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* ===== Mini Idle: default mini-mode resting state ===== */
      /*
        Looping. Breathe 3.2s, blink 4s, arm idle sway 25s.
        JS eye tracking hooks present (#eyes-js, #body-js).
        Tilted -12deg. No shadow. Extended left arm.
      */

      /* ===== 1. Sub-animations ===== */
      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      .eyes-blink {
        transform-origin: 7.5px 9px;
        animation: eye-blink 4s infinite ease-in-out;
      }

      /* ===== 3. Arm: mostly still, occasional brief wave ===== */
      .arm-idle {
        transform-origin: 2px 9px;
        animation: arm-idle-sway 25s infinite ease-in-out;
      }

      /* ===== 5. JS hooks ===== */
      #eyes-js, #body-js {
        transition: transform 0.2s ease-out;
      }

      /* ===== Keyframes ===== */
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50%      { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }

      @keyframes eye-blink {
        0%, 10%, 100% { transform: scaleY(1); }
        5%            { transform: scaleY(0.1); }
      }

      /* 25s cycle: still most of the time, 2 quick waves at ~40% */
      @keyframes arm-idle-sway {
        0%, 36%   { transform: rotate(0deg); }
        38%       { transform: rotate(25deg); }
        40%       { transform: rotate(-8deg); }
        42%       { transform: rotate(20deg); }
        44%, 100% { transform: rotate(0deg); }
      }
    </style>
  </defs>

  <!-- No shadow (mini mode) -->

  <!-- Entire character tilted -12deg (mini mode) -->
  <g transform="rotate(-12, 7.5, 15)">

    <!-- Layer 1: Legs (independent, static) -->
    <g fill="#DE886D">
      <rect x="3" y="11" width="1" height="4"/>
      <rect x="5" y="11" width="1" height="4"/>
      <rect x="9" y="11" width="1" height="4"/>
      <rect x="11" y="11" width="1" height="4"/>
    </g>

    <!-- Layer 2: Upper Body -->
    <g id="body-js">
      <g class="breathe-anim">
        <!-- Torso -->
        <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>

        <!-- Left Arm (extended, occasional idle wave) -->
        <g class="arm-idle">
          <rect x="-1.5" y="9" width="4.5" height="2" fill="#DE886D"/>
        </g>

        <!-- Right Arm -->
        <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>

        <!-- Eyes: JS translate wrapper + CSS blink -->
        <g id="eyes-js" fill="#000">
          <g class="eyes-blink">
            <rect x="4" y="8" width="1" height="2"/>
            <rect x="10" y="8" width="1" height="2"/>
          </g>
        </g>
      </g>
    </g>

  </g>
</svg>
