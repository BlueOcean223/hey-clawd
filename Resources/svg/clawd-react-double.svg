<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* ===== 3.5s one-shot: frantic left-right + question + exclamation ===== */
      /* Timeline: 0-4% prep | 5-18% look left | 18-32% look right | 32-40% snap left |
         40-46% snap right | 46-72% stare up-right + excl | 72-85% return | 85-100% settle */

      /* 1. Eye blink (independent loop) */
      .eyes-blink {
        transform-origin: 7.5px 9px;
        animation: eye-blink 3s infinite linear;
      }

      /* 2. Main body: frantic snapping */
      .action-body {
        transform-origin: 7.5px 13px;
        animation: body-panic 3.5s 1 ease-in-out forwards;
      }

      /* 3. Components */
      .eyes-look {
        animation: eyes-panic 3.5s 1 ease-in-out forwards;
      }
      .arm-l {
        transform-origin: 2px 10px;
        animation: arm-l-panic 3.5s 1 ease-in-out forwards;
      }
      .arm-r {
        transform-origin: 13px 10px;
        animation: arm-r-panic 3.5s 1 ease-in-out forwards;
      }

      /* 4. Effects */
      .shadow-anim {
        transform-origin: 7.5px 15.5px;
        animation: shadow-react 3.5s 1 ease-in-out forwards;
      }
      .question-pop {
        transform-origin: center;
        animation: question-fade 3.5s 1 ease-in-out forwards;
        opacity: 0;
      }
      .exclamation-pop {
        transform-origin: center;
        animation: excl-fade 3.5s 1 ease-in-out forwards;
        opacity: 0;
      }

      /* ===== Keyframes ===== */

      /* Frantic left-right looking */
      @keyframes body-panic {
        0%, 4%    { transform: translate(0, 0); }
        10%, 18%  { transform: translate(-1px, 0); }
        24%, 32%  { transform: translate(1px, 0); }
        36%       { transform: translate(-1px, 0); }
        40%       { transform: translate(1px, 0); }
        46%, 72%  { transform: translate(1px, -1px); }
        82%, 100% { transform: translate(0, 0); }
      }

      /* Eyes snap faster than body (gaze leads) */
      @keyframes eyes-panic {
        0%, 4%    { transform: translate(0, 0); }
        10%, 18%  { transform: translate(-2px, 0); }
        24%, 32%  { transform: translate(2px, 0); }
        36%       { transform: translate(-2px, 0); }
        40%       { transform: translate(2px, 0); }
        46%, 72%  { transform: translate(3px, -2px); }
        82%, 100% { transform: translate(0, 0); }
      }

      /* Arms flare with panic */
      @keyframes arm-l-panic {
        0%, 4%    { transform: rotate(0deg); }
        10%, 18%  { transform: rotate(25deg); }
        24%, 32%  { transform: rotate(-10deg); }
        36%       { transform: rotate(20deg); }
        40%       { transform: rotate(-5deg); }
        46%, 72%  { transform: rotate(-15deg); }
        82%, 100% { transform: rotate(0deg); }
      }
      @keyframes arm-r-panic {
        0%, 4%    { transform: rotate(0deg); }
        10%, 18%  { transform: rotate(10deg); }
        24%, 32%  { transform: rotate(-25deg); }
        36%       { transform: rotate(5deg); }
        40%       { transform: rotate(-20deg); }
        46%, 72%  { transform: rotate(-25deg); }
        82%, 100% { transform: rotate(0deg); }
      }

      /* Blink with extra blinks during panic */
      @keyframes eye-blink {
        0%, 20%, 24%, 60%, 64%, 80%, 84%, 100% { transform: scaleY(1); }
        22%, 62%, 82% { transform: scaleY(0.1); }
      }

      /* Question mark: appears early (while looking left), pops with overshoot */
      @keyframes question-fade {
        0%, 6%    { opacity: 0; transform: translate(-4px, 4px) scale(0); }
        12%       { opacity: 1; transform: translate(-4px, -1px) scale(1.2); }
        16%, 38%  { opacity: 1; transform: translate(-4px, 0) scale(1); }
        44%, 100% { opacity: 0; transform: translate(-4px, -4px) scale(1.2); }
      }

      /* Exclamation: appears later (while staring up-right), pops with overshoot */
      @keyframes excl-fade {
        0%, 42%   { opacity: 0; transform: translate(6px, 0) scale(0); }
        48%       { opacity: 1; transform: translate(6px, -3px) scale(1.3); }
        52%, 72%  { opacity: 1; transform: translate(6px, -4px) scale(1); }
        80%, 100% { opacity: 0; transform: translate(6px, -8px) scale(1.2); }
      }

      /* Shadow follows body */
      @keyframes shadow-react {
        0%, 4%    { transform: translate(0, 0) scaleX(1); opacity: 0.5; }
        10%, 18%  { transform: translate(-0.5px, 0) scaleX(0.98); opacity: 0.48; }
        24%, 32%  { transform: translate(0.5px, 0) scaleX(0.98); opacity: 0.48; }
        46%, 72%  { transform: translate(0.5px, 0) scaleX(0.96); opacity: 0.46; }
        82%, 100% { transform: translate(0, 0) scaleX(1); opacity: 0.5; }
      }
    </style>

    <!-- Pixel question mark definition -->
    <g id="pixel-question">
      <rect x="1" y="0" width="2" height="1"/>
      <rect x="0" y="1" width="1" height="1"/>
      <rect x="3" y="1" width="1" height="2"/>
      <rect x="2" y="3" width="1" height="1"/>
      <rect x="1" y="4" width="1" height="1"/>
      <rect x="1" y="6" width="1" height="1"/>
    </g>
  </defs>

  <!-- Layer 0: Shadow -->
  <rect class="shadow-anim" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>

  <!-- Layer 1: Legs (static, extended to prevent gap) -->
  <g id="legs" fill="#DE886D">
    <rect x="3" y="11" width="1" height="4"/>
    <rect x="5" y="11" width="1" height="4"/>
    <rect x="9" y="11" width="1" height="4"/>
    <rect x="11" y="11" width="1" height="4"/>
  </g>

  <!-- Layer 2: Upper Body -->
  <g class="action-body">
    <g fill="#DE886D">
      <rect x="2" y="6" width="11" height="7"/>
      <g class="arm-l">
        <rect x="0" y="9" width="2" height="2"/>
      </g>
      <g class="arm-r">
        <rect x="13" y="9" width="2" height="2"/>
      </g>
    </g>
    <g class="eyes-look">
      <g class="eyes-blink" fill="#000">
        <rect x="4" y="8" width="1" height="2"/>
        <rect x="10" y="8" width="1" height="2"/>
      </g>
    </g>
  </g>

  <!-- Layer 3: Effects -->
  <!-- Question Mark (left side, white) -->
  <g class="question-pop" fill="#FFFFFF">
    <use href="#pixel-question"/>
  </g>

  <!-- Exclamation Mark (right side, blue) -->
  <g class="exclamation-pop" fill="#0082FC">
    <rect x="1" y="0" width="1" height="4"/>
    <rect x="1" y="5" width="1" height="1"/>
  </g>
</svg>
