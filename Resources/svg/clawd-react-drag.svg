<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* ===== Drag reaction: UFO tractor beam abduction =====
         Looping. The user's cursor IS the UFO.
         Cyan beam pulses from above, body sways helplessly,
         legs kick, arms flail, debris floats up around. */

      /* ===== 1. Eyes: rapid scared blink (normal size) ===== */
      .eyes-panic {
        transform-origin: 7.5px 9px;
        animation: panic-blink 1.2s infinite ease-in-out;
      }

      /* ===== 2. Body sways in tractor beam ===== */
      .action-body {
        transform-origin: 7.5px 6px;
        animation: body-sway 1.6s infinite alternate ease-in-out;
      }

      /* ===== 3. Component animations ===== */

      /* Each leg has its own origin at its top-center for natural pendulum swing */
      .leg-1 {
        transform-origin: 3.5px 13px;
        animation: kick-a 0.55s infinite ease-in-out;
      }
      .leg-2 {
        transform-origin: 5.5px 13px;
        animation: kick-b 0.65s infinite ease-in-out;
      }
      .leg-3 {
        transform-origin: 9.5px 13px;
        animation: kick-c 0.6s infinite ease-in-out;
      }
      .leg-4 {
        transform-origin: 11.5px 13px;
        animation: kick-d 0.5s infinite ease-in-out;
      }

      /* Arms flail desperately (different speeds) */
      .arm-l {
        transform-origin: 2px 10px;
        animation: flail-l 0.25s infinite alternate ease-in-out;
      }
      .arm-r {
        transform-origin: 13px 10px;
        animation: flail-r 0.3s infinite alternate ease-in-out;
      }

      /* ===== 4. Effects ===== */

      .shadow-anim {
        transform-origin: 7.5px 15.5px;
        animation: shadow-lift 1.6s infinite alternate ease-in-out;
      }

      /* Tractor beam lines */
      .beam-line {
        animation: beam-pulse 0.8s infinite linear;
        opacity: 0;
      }
      .bl1 { animation-delay: 0s; }
      .bl2 { animation-delay: -0.2s; }
      .bl3 { animation-delay: -0.4s; }
      .bl4 { animation-delay: -0.6s; }

      /* Floating debris */
      .debris { opacity: 0; }
      .db1 { animation: float-debris-1 3s infinite ease-out; animation-delay: 0s; }
      .db2 { animation: float-debris-2 3.5s infinite ease-out; animation-delay: -1.2s; }
      .db3 { animation: float-debris-3 2.8s infinite ease-out; animation-delay: -0.6s; }
      .db4 { animation: float-debris-4 3.2s infinite ease-out; animation-delay: -2s; }

      /* Sweat drops */
      .sweat { opacity: 0; }
      .sw1 { animation: sweat-fly-l 0.8s infinite ease-out; animation-delay: 0s; }
      .sw2 { animation: sweat-fly-r 0.8s infinite ease-out; animation-delay: -0.4s; }

      /* ===== Keyframes ===== */

      @keyframes body-sway {
        0%   { transform: rotate(-4deg) translate(-1px, 0); }
        100% { transform: rotate(4deg) translate(1px, 0); }
      }

      /* 4 legs, each slightly different timing and range for chaotic kicking */
      @keyframes kick-a {
        0%, 100% { transform: rotate(0deg); }
        30%      { transform: rotate(-12deg); }
        70%      { transform: rotate(8deg); }
      }
      @keyframes kick-b {
        0%, 100% { transform: rotate(0deg); }
        25%      { transform: rotate(10deg); }
        75%      { transform: rotate(-14deg); }
      }
      @keyframes kick-c {
        0%, 100% { transform: rotate(0deg); }
        35%      { transform: rotate(-10deg); }
        65%      { transform: rotate(12deg); }
      }
      @keyframes kick-d {
        0%, 100% { transform: rotate(0deg); }
        20%      { transform: rotate(14deg); }
        80%      { transform: rotate(-8deg); }
      }

      @keyframes flail-l {
        0%   { transform: rotate(50deg); }
        100% { transform: rotate(90deg); }
      }
      @keyframes flail-r {
        0%   { transform: rotate(-55deg); }
        100% { transform: rotate(-85deg); }
      }

      /* Rapid scared blink at normal eye size */
      @keyframes panic-blink {
        0%, 28%, 38%, 100% { transform: scaleY(1); }
        33%                { transform: scaleY(0.1); }
      }

      @keyframes shadow-lift {
        0%   { transform: scaleX(0.5); opacity: 0.15; }
        100% { transform: scaleX(0.6); opacity: 0.22; }
      }

      @keyframes beam-pulse {
        0%   { opacity: 0; transform: translateY(0); }
        15%  { opacity: 0.6; }
        85%  { opacity: 0.25; }
        100% { opacity: 0; transform: translateY(22px); }
      }

      @keyframes float-debris-1 {
        0%   { opacity: 0; transform: translate(0, 18px); }
        8%   { opacity: 0.8; }
        75%  { opacity: 0.4; }
        100% { opacity: 0; transform: translate(-3px, -12px) rotate(180deg); }
      }
      @keyframes float-debris-2 {
        0%   { opacity: 0; transform: translate(0, 20px); }
        8%   { opacity: 0.8; }
        75%  { opacity: 0.4; }
        100% { opacity: 0; transform: translate(2px, -14px) rotate(-150deg); }
      }
      @keyframes float-debris-3 {
        0%   { opacity: 0; transform: translate(0, 16px); }
        8%   { opacity: 0.8; }
        75%  { opacity: 0.4; }
        100% { opacity: 0; transform: translate(-4px, -10px) rotate(120deg); }
      }
      @keyframes float-debris-4 {
        0%   { opacity: 0; transform: translate(0, 22px); }
        8%   { opacity: 0.8; }
        75%  { opacity: 0.4; }
        100% { opacity: 0; transform: translate(3px, -16px) rotate(200deg); }
      }

      @keyframes sweat-fly-l {
        0%   { opacity: 0; transform: translate(0, 0); }
        12%  { opacity: 1; }
        100% { opacity: 0; transform: translate(-4px, 3px); }
      }
      @keyframes sweat-fly-r {
        0%   { opacity: 0; transform: translate(0, 0); }
        12%  { opacity: 1; }
        100% { opacity: 0; transform: translate(4px, 3px); }
      }
    </style>
  </defs>

  <!-- Layer 0: Shadow (tiny, faint) -->
  <rect class="shadow-anim" x="4" y="15" width="7" height="1" fill="#000"/>

  <!-- Layer 1: Tractor beam (cyan scan lines behind character) -->
  <g fill="#40C4FF" opacity="0.7">
    <rect class="beam-line bl1" x="4"  y="-25" width="1" height="3"/>
    <rect class="beam-line bl2" x="7"  y="-25" width="1" height="2"/>
    <rect class="beam-line bl3" x="10" y="-25" width="1" height="3"/>
    <rect class="beam-line bl4" x="6"  y="-25" width="1" height="2"/>
  </g>

  <!-- Layer 2: Floating debris -->
  <!-- Keyboard keycap -->
  <g class="debris db1">
    <rect x="-3" y="8" width="2" height="2" fill="#555"/>
    <rect x="-2.5" y="8.5" width="1" height="1" fill="#888"/>
  </g>
  <!-- Coffee cup -->
  <g class="debris db2">
    <rect x="16" y="6" width="2" height="2" fill="#795548"/>
    <rect x="18" y="6.5" width="1" height="1" fill="#795548"/>
  </g>
  <!-- Code bracket { -->
  <g class="debris db3" fill="#40C4FF">
    <rect x="-5" y="4" width="1" height="1"/>
    <rect x="-6" y="5" width="1" height="2"/>
    <rect x="-5" y="7" width="1" height="1"/>
  </g>
  <!-- Pixel star -->
  <g class="debris db4" fill="#FFD700">
    <rect x="19" y="2" width="1" height="1"/>
    <rect x="18" y="3" width="1" height="1"/>
    <rect x="20" y="3" width="1" height="1"/>
    <rect x="19" y="4" width="1" height="1"/>
  </g>

  <!-- Layer 3: Body (sways in beam, legs INSIDE since lifted) -->
  <g class="action-body">
    <!-- Dangling legs (each with its own origin and timing) -->
    <g fill="#DE886D">
      <rect class="leg-1" x="3" y="13" width="1" height="2"/>
      <rect class="leg-2" x="5" y="13" width="1" height="2"/>
      <rect class="leg-3" x="9" y="13" width="1" height="2"/>
      <rect class="leg-4" x="11" y="13" width="1" height="2"/>
    </g>

    <!-- Torso -->
    <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>

    <!-- Flailing arms -->
    <g class="arm-l" fill="#DE886D">
      <rect x="0" y="9" width="2" height="2"/>
    </g>
    <g class="arm-r" fill="#DE886D">
      <rect x="13" y="9" width="2" height="2"/>
    </g>

    <!-- Panicked eyes (normal size, rapid blink) -->
    <g class="eyes-panic" fill="#000">
      <rect x="4" y="8" width="1" height="2"/>
      <rect x="10" y="8" width="1" height="2"/>
    </g>

    <!-- Open mouth (screaming) -->
    <rect x="6" y="11" width="3" height="2" fill="#000"/>

    <!-- Sweat drops -->
    <rect class="sweat sw1" x="1" y="7" width="1" height="1" fill="#40C4FF"/>
    <rect class="sweat sw2" x="14" y="7" width="1" height="1" fill="#40C4FF"/>
  </g>
</svg>
