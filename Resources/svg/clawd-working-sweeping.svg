<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* ===== Working Sweeping: context compacted / cleanup ===== */
      /*
        One-shot 5.5s animation. Clawd sweeps pixel debris off-screen.
        Right arm holds broom, left arm rests on hip.
        Body sways with sweep rhythm.
        Pixel debris flies left as broom sweeps.
      */

      /* ===== 1. Sub-animations ===== */
      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      .eyes-blink {
        transform-origin: 7.5px 9px;
        animation: eye-blink 4s infinite ease-in-out;
      }

      /* ===== 2. Main timeline: sweep body sway ===== */
      .action-body {
        transform-origin: 7.5px 13px;
        animation: sweep-body 2.2s infinite ease-in-out;
      }

      /* ===== 3. Arms ===== */
      /* Right arm: sweeping motion with broom */
      .arm-sweep {
        transform-origin: 13px 10px;
        animation: arm-sweep 1.1s infinite ease-in-out;
      }

      /* Left arm: resting on hip, slight bob */
      .arm-hip {
        transform-origin: 2px 10px;
        animation: arm-hip 2.2s infinite ease-in-out;
      }

      /* ===== 4. Effects ===== */
      /* Shadow synced with body sway */
      .shadow-anim {
        transform-origin: 7.5px 15.5px;
        animation: shadow-sweep 2.2s infinite ease-in-out;
      }

      /* Pixel debris flying left */
      .debris {
        opacity: 0;
        animation: debris-fly 1.1s infinite ease-out;
      }
      .db1 { animation-delay: 0s; }
      .db2 { animation-delay: -0.25s; }
      .db3 { animation-delay: -0.5s; }
      .db4 { animation-delay: -0.75s; }

      /* Dust puff at sweep contact */
      .dust {
        opacity: 0;
        animation: dust-puff 1.1s infinite ease-out;
      }
      .du1 { animation-delay: -0.1s; }
      .du2 { animation-delay: -0.4s; }

      /* Broom */
      .broom {
        transform-origin: 14px 13px;
        animation: broom-sweep 1.1s infinite ease-in-out;
      }

      /* ===== Keyframes ===== */
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50%      { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }

      @keyframes eye-blink {
        0%, 10%, 100% { transform: scaleY(1); }
        5%            { transform: scaleY(0.1); }
      }

      /* Body sways right-left with sweep rhythm */
      @keyframes sweep-body {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        25%      { transform: translate(1px, 0) rotate(2deg); }
        50%      { transform: translate(0, 0) rotate(0deg); }
        75%      { transform: translate(-0.5px, 0) rotate(-1deg); }
      }

      /* Right arm: sweep arc */
      @keyframes arm-sweep {
        0%, 100% { transform: rotate(15deg); }
        40%      { transform: rotate(-30deg); }
        60%      { transform: rotate(-25deg); }
      }

      /* Left arm: subtle bob on hip */
      @keyframes arm-hip {
        0%, 100% { transform: rotate(-15deg) translate(0, -1px); }
        50%      { transform: rotate(-12deg) translate(0, -0.5px); }
      }

      @keyframes shadow-sweep {
        0%, 100% { transform: scaleX(1) translate(0, 0); opacity: 0.5; }
        25%      { transform: scaleX(1.03) translate(0.5px, 0); opacity: 0.52; }
        75%      { transform: scaleX(0.98) translate(-0.3px, 0); opacity: 0.48; }
      }

      /* Debris: small rects fly left and fade */
      @keyframes debris-fly {
        0%   { transform: translate(0, 0); opacity: 0; }
        15%  { opacity: 0.8; }
        100% { transform: translate(-14px, -3px); opacity: 0; }
      }

      /* Dust puff: scale up and fade */
      @keyframes dust-puff {
        0%   { transform: scale(0.5); opacity: 0; }
        20%  { opacity: 0.4; }
        100% { transform: translate(-4px, -1px) scale(1.5); opacity: 0; }
      }

      /* Broom handle + bristles follow arm */
      @keyframes broom-sweep {
        0%, 100% { transform: rotate(15deg); }
        40%      { transform: rotate(-30deg); }
        60%      { transform: rotate(-25deg); }
      }
    </style>
  </defs>

  <!-- Layer 0: Shadow -->
  <rect class="shadow-anim" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>

  <!-- Layer 1: Legs (static, independent) -->
  <g id="legs" fill="#DE886D">
    <rect x="3" y="13" width="1" height="2"/>
    <rect x="5" y="13" width="1" height="2"/>
    <rect x="9" y="13" width="1" height="2"/>
    <rect x="11" y="13" width="1" height="2"/>
  </g>

  <!-- Layer 2: Body (action > breathe) -->
  <g class="action-body">
    <g class="breathe-anim">
      <!-- Torso -->
      <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>

      <!-- Left arm (on hip) -->
      <g class="arm-hip">
        <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
      </g>

      <!-- Right arm (sweeping) -->
      <g class="arm-sweep">
        <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
      </g>

      <!-- Eyes: focused down-right (watching the sweep) -->
      <g class="eyes-blink" fill="#000">
        <g transform="translate(0.5, 0.5)">
          <rect x="4" y="8" width="1" height="2"/>
          <rect x="10" y="8" width="1" height="2"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Layer 3: Broom (follows right arm) -->
  <g class="broom">
    <!-- Handle -->
    <rect x="15" y="8" width="0.8" height="7" fill="#8D6E63"/>
    <!-- Bristles -->
    <g fill="#A1887F">
      <rect x="14" y="14.5" width="1" height="1.5"/>
      <rect x="15" y="14.5" width="1" height="1.5"/>
      <rect x="16" y="14.5" width="1" height="1.5"/>
    </g>
  </g>

  <!-- Pixel debris flying left -->
  <g fill="#90A4AE">
    <rect class="debris db1" x="13" y="14" width="1" height="1"/>
    <rect class="debris db2" x="14" y="13" width="0.8" height="0.8"/>
    <rect class="debris db3" x="12" y="14.5" width="0.6" height="0.6"/>
    <rect class="debris db4" x="15" y="13.5" width="0.7" height="0.7"/>
  </g>

  <!-- Dust puffs -->
  <g fill="#BDBDBD">
    <rect class="dust du1" x="12" y="14" width="2" height="1"/>
    <rect class="dust du2" x="10" y="13.5" width="1.5" height="1"/>
  </g>
</svg>
