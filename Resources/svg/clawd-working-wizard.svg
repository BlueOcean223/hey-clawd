<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* ===== 1. Independent sub-animations ===== */

      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      .eyes-blink {
        transform-origin: 7.5px 9px;
        animation: eye-blink 4s infinite ease-in-out;
      }

      /* ===== 2. Main 12.8s timeline (4x breathe) ===== */

      .action-body {
        transform-origin: 7.5px 13px;
        animation: body-sway 12.8s infinite ease-in-out;
      }

      .shadow-anim {
        transform-origin: 7.5px 15.5px;
        animation: shadow-magic 12.8s infinite ease-in-out;
      }

      /* ===== 3. Component animations ===== */

      .arm-l {
        transform-origin: 2px 10px;
        animation: arm-l-cast 3.5s infinite ease-in-out;
      }

      .arm-r {
        transform-origin: 13px 10px;
        animation: arm-r-wand 3s infinite ease-in-out;
      }

      /* Hat flies up independently */
      .hat-group {
        transform-origin: 7.5px 4px;
        animation: hat-fly 12.8s infinite ease-in-out;
      }

      /* ===== 4. Effect animations ===== */

      .hat-star {
        animation: twinkle 2.5s infinite ease-in-out;
      }
      .hs1 { animation-delay: 0s; }
      .hs2 { animation-delay: -0.8s; }
      .hs3 { animation-delay: -1.6s; }

      .sparkle {
        opacity: 0;
      }
      .sp1 {
        animation: sparkle-a 2s infinite ease-in-out;
        animation-delay: 0s;
      }
      .sp2 {
        animation: sparkle-b 2s infinite ease-in-out;
        animation-delay: -0.7s;
      }
      .sp3 {
        animation: sparkle-c 2s infinite ease-in-out;
        animation-delay: -1.4s;
      }

      .burst {
        transform-origin: 17.5px 4.5px;
        animation: burst-expand 4s infinite ease-out;
        animation-delay: -1s;
      }

      /* ===== Keyframes ===== */

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50%      { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }

      @keyframes eye-blink {
        0%, 10%, 100% { transform: scaleY(1); }
        5%            { transform: scaleY(0.1); }
      }

      /* Body sways gently, NO vertical float */
      @keyframes body-sway {
        0%, 100%  { transform: translate(0, 0) rotate(0deg); }
        25%       { transform: translate(-0.5px, 0) rotate(-0.5deg); }
        50%       { transform: translate(0, 0) rotate(0deg); }
        75%       { transform: translate(0.5px, 0) rotate(0.5deg); }
      }

      /* Shadow follows body sway */
      @keyframes shadow-magic {
        0%, 100%  { transform: scaleX(1) translate(0, 0); opacity: 0.5; }
        25%       { transform: scaleX(0.98) translate(-0.5px, 0); opacity: 0.48; }
        50%       { transform: scaleX(1) translate(0, 0); opacity: 0.5; }
        75%       { transform: scaleX(0.98) translate(0.5px, 0); opacity: 0.48; }
      }

      /* Hat flies up, hovers, comes back down */
      @keyframes hat-fly {
        0%, 8%    { transform: translate(0, 0) rotate(0deg); }
        15%       { transform: translate(0, -1px) rotate(-2deg); }
        25%       { transform: translate(-1px, -6px) rotate(-5deg); }
        40%       { transform: translate(1px, -8px) rotate(3deg); }
        55%       { transform: translate(-0.5px, -7px) rotate(-2deg); }
        70%       { transform: translate(0.5px, -4px) rotate(2deg); }
        82%       { transform: translate(0, -1px) rotate(-1deg); }
        92%, 100% { transform: translate(0, 0) rotate(0deg); }
      }

      /* Left arm slow mystical wave */
      @keyframes arm-l-cast {
        0%, 100% { transform: rotate(0deg); }
        30%      { transform: rotate(-15deg); }
        70%      { transform: rotate(5deg); }
      }

      /* Right arm wand wave */
      @keyframes arm-r-wand {
        0%, 100% { transform: rotate(-12deg); }
        50%      { transform: rotate(12deg); }
      }

      /* Hat star twinkle */
      @keyframes twinkle {
        0%, 100% { opacity: 0.4; }
        50%      { opacity: 1; }
      }

      /* Sparkle trails from wand tip */
      @keyframes sparkle-a {
        0%, 100% { opacity: 0; transform: translate(0, 0); }
        20%      { opacity: 1; transform: translate(-1px, -1px); }
        50%      { opacity: 0; transform: translate(-2px, -2px); }
      }
      @keyframes sparkle-b {
        0%, 100% { opacity: 0; transform: translate(0, 0); }
        20%      { opacity: 1; transform: translate(1px, -1px); }
        50%      { opacity: 0; transform: translate(2px, -2px); }
      }
      @keyframes sparkle-c {
        0%, 100% { opacity: 0; transform: translate(0, 0); }
        20%      { opacity: 1; transform: translate(0, -2px); }
        50%      { opacity: 0; transform: translate(1px, -3px); }
      }

      /* Burst from wand tip */
      @keyframes burst-expand {
        0%, 85%  { opacity: 0; transform: scale(0); }
        88%      { opacity: 1; transform: scale(1); }
        95%      { opacity: 0.5; transform: scale(2); }
        100%     { opacity: 0; transform: scale(2.5); }
      }
    </style>
  </defs>

  <!-- Layer 0: Shadow -->
  <rect class="shadow-anim" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>

  <!-- Layer 1: Legs (static, independent) -->
  <g id="legs" fill="#DE886D">
    <rect x="3" y="13" width="1" height="2"/>
    <rect x="5" y="13" width="1" height="2"/>
    <rect x="9" y="13" width="1" height="2"/>
    <rect x="11" y="13" width="1" height="2"/>
  </g>

  <!-- Layer 2: Body group (action > breathe), NO hat inside -->
  <g class="action-body">
    <g class="breathe-anim">
      <!-- Torso -->
      <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>

      <!-- Left arm -->
      <g class="arm-l">
        <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
      </g>

      <!-- Eyes -->
      <g class="eyes-blink" fill="#000000">
        <rect x="4" y="8" width="1" height="2"/>
        <rect x="10" y="8" width="1" height="2"/>
      </g>

      <!-- Wizard hat (inside breathe group: sits on head, flies up independently) -->
      <g class="hat-group">
        <!-- Brim -->
        <rect x="1" y="4" width="13" height="1" fill="#4A3682"/>
        <!-- Base -->
        <rect x="3" y="1" width="9" height="3" fill="#4A3682"/>
        <!-- Mid -->
        <rect x="4" y="-1" width="7" height="2" fill="#4A3682"/>
        <!-- Upper -->
        <rect x="5" y="-3" width="5" height="2" fill="#4A3682"/>
        <!-- Tip -->
        <rect x="6" y="-5" width="3" height="2" fill="#4A3682"/>
        <!-- Peak -->
        <rect x="7" y="-6" width="1" height="1" fill="#4A3682"/>

        <!-- Hat decorative stars -->
        <rect class="hat-star hs1" x="5" y="0" width="1" height="1" fill="#E8D5B0"/>
        <rect class="hat-star hs2" x="8" y="-2" width="1" height="1" fill="#E8D5B0"/>
        <rect class="hat-star hs3" x="10" y="1" width="1" height="1" fill="#E8D5B0"/>
      </g>

      <!-- Right arm + wand -->
      <g class="arm-r">
        <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
        <!-- Wand stick -->
        <rect x="14" y="8" width="1" height="1" fill="#333"/>
        <rect x="15" y="7" width="1" height="1" fill="#333"/>
        <rect x="16" y="6" width="1" height="1" fill="#333"/>
        <rect x="17" y="5" width="1" height="1" fill="#333"/>
        <!-- Wand tip star -->
        <rect x="17" y="4" width="1" height="1" fill="#FFD700"/>

        <!-- Sparkles near wand tip -->
        <rect class="sparkle sp1" x="16" y="3" width="1" height="1" fill="#FFD700"/>
        <rect class="sparkle sp2" x="18" y="3" width="1" height="1" fill="#E040FB"/>
        <rect class="sparkle sp3" x="17" y="2" width="1" height="1" fill="#40C4FF"/>

        <!-- Burst rects -->
        <g class="burst">
          <rect x="15" y="3" width="1" height="1" fill="#FFD700" opacity="0.8"/>
          <rect x="19" y="3" width="1" height="1" fill="#E040FB" opacity="0.8"/>
          <rect x="17" y="1" width="1" height="1" fill="#40C4FF" opacity="0.8"/>
          <rect x="17" y="6" width="1" height="1" fill="#FFD700" opacity="0.8"/>
        </g>
      </g>
    </g>
  </g>
</svg>
