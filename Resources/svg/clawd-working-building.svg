<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <style>
    @keyframes hc-build-body-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-0.8px); }
    }
    @keyframes hc-build-larm {
      0%, 100% { transform: rotate(-30deg); }
      50% { transform: rotate(30deg); }
    }
    @keyframes hc-build-rarm {
      0%, 100% { transform: rotate(30deg); }
      50% { transform: rotate(-30deg); }
    }
    @keyframes hc-build-lleg1 {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1px); }
    }
    @keyframes hc-build-lleg2 {
      0%, 100% { transform: translateY(-1px); }
      50% { transform: translateY(0); }
    }
    @keyframes hc-build-progress {
      0% { width: 0; }
      90% { width: 10px; }
      100% { width: 10px; }
    }
    @keyframes hc-build-dust1 {
      0%, 100% { opacity: 0; transform: translate(0,0); }
      10% { opacity: 0.6; }
      50% { opacity: 0.3; transform: translate(-2px, -1px); }
      80% { opacity: 0; transform: translate(-3px, -2px); }
    }
    @keyframes hc-build-dust2 {
      0%, 100% { opacity: 0; transform: translate(0,0); }
      30% { opacity: 0; }
      40% { opacity: 0.6; }
      70% { opacity: 0.3; transform: translate(2px, -1px); }
      90% { opacity: 0; transform: translate(3px, -2px); }
    }
    .hc-build-body { animation: hc-build-body-bob 0.25s ease-in-out infinite; }
    .hc-build-larm { animation: hc-build-larm 0.25s ease-in-out infinite; transform-origin: 1px 10px; }
    .hc-build-rarm { animation: hc-build-rarm 0.25s ease-in-out infinite; transform-origin: 14px 10px; }
    .hc-build-ll1 { animation: hc-build-lleg1 0.25s ease-in-out infinite; }
    .hc-build-ll2 { animation: hc-build-lleg2 0.25s ease-in-out infinite; }
    .hc-build-fill { animation: hc-build-progress 3s linear infinite; }
    .hc-build-dust1 { animation: hc-build-dust1 0.5s ease-out infinite; }
    .hc-build-dust2 { animation: hc-build-dust2 0.5s ease-out infinite; }
  </style>

  <!-- Progress bar background -->
  <rect x="1" y="-8" width="12" height="2" rx="0.3" fill="#37474F"/>
  <!-- Progress bar border -->
  <rect x="1" y="-8" width="12" height="2" rx="0.3" fill="none" stroke="#546E7A" stroke-width="0.3"/>
  <!-- Progress bar fill -->
  <rect class="hc-build-fill" x="1.3" y="-7.7" width="0" height="1.4" fill="#4CAF50"/>
  <!-- Percentage text area -->
  <rect x="5.5" y="-9.5" width="3" height="1" fill="none"/>

  <g class="hc-build-body">
    <!-- Shadow -->
    <rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
    <!-- Torso -->
    <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
    <!-- Eyes -->
    <rect x="4" y="8" width="1" height="2" fill="#000"/>
    <rect x="10" y="8" width="1" height="2" fill="#000"/>
    <!-- Legs -->
    <g class="hc-build-ll1">
      <rect x="3" y="13" width="1" height="2" fill="#DE886D"/>
      <rect x="9" y="13" width="1" height="2" fill="#DE886D"/>
    </g>
    <g class="hc-build-ll2">
      <rect x="5" y="13" width="1" height="2" fill="#DE886D"/>
      <rect x="11" y="13" width="1" height="2" fill="#DE886D"/>
    </g>
  </g>

  <!-- Left arm -->
  <g class="hc-build-larm">
    <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
  </g>
  <!-- Right arm -->
  <g class="hc-build-rarm">
    <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
  </g>

  <!-- Dust particles -->
  <rect class="hc-build-dust1" x="2" y="14" width="1" height="1" fill="#A1887F" opacity="0"/>
  <rect class="hc-build-dust2" x="12" y="14" width="1" height="1" fill="#A1887F" opacity="0"/>
  <rect class="hc-build-dust1" x="1" y="13.5" width="0.7" height="0.7" fill="#BCAAA4" opacity="0" style="animation-delay: 0.15s;"/>
  <rect class="hc-build-dust2" x="13" y="13.5" width="0.7" height="0.7" fill="#BCAAA4" opacity="0" style="animation-delay: 0.15s;"/>
</svg>
