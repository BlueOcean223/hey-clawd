<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <style>
    @keyframes hc-think-sway {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(1px); }
    }
    @keyframes hc-think-eyes {
      0%, 100% { transform: translate(-0.5px, -0.5px); }
      50% { transform: translate(-1px, -1px); }
    }
    @keyframes hc-think-dot1 {
      0%, 10% { opacity: 0; }
      15%, 45% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes hc-think-dot2 {
      0%, 25% { opacity: 0; }
      30%, 55% { opacity: 1; }
      60%, 100% { opacity: 0; }
    }
    @keyframes hc-think-dot3 {
      0%, 40% { opacity: 0; }
      45%, 65% { opacity: 1; }
      70%, 100% { opacity: 0; }
    }
    @keyframes hc-think-rarm {
      0%, 100% { transform: rotate(-45deg) translateY(-2px); }
      50% { transform: rotate(-40deg) translateY(-2.5px); }
    }
    .hc-think-body { animation: hc-think-sway 4s ease-in-out infinite; }
    .hc-think-eye-group { animation: hc-think-eyes 4s ease-in-out infinite; }
    .hc-think-d1 { animation: hc-think-dot1 6s ease-in-out infinite; }
    .hc-think-d2 { animation: hc-think-dot2 6s ease-in-out infinite; }
    .hc-think-d3 { animation: hc-think-dot3 6s ease-in-out infinite; }
    .hc-think-rarm { animation: hc-think-rarm 4s ease-in-out infinite; transform-origin: 14px 10px; }
  </style>

  <g class="hc-think-body">
    <!-- Shadow -->
    <rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
    <!-- Torso -->
    <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
    <!-- Eyes looking up-left -->
    <g class="hc-think-eye-group">
      <rect x="4" y="8" width="1" height="2" fill="#000"/>
      <rect x="10" y="8" width="1" height="2" fill="#000"/>
    </g>
    <!-- Legs -->
    <rect x="3" y="13" width="1" height="2" fill="#DE886D"/>
    <rect x="5" y="13" width="1" height="2" fill="#DE886D"/>
    <rect x="9" y="13" width="1" height="2" fill="#DE886D"/>
    <rect x="11" y="13" width="1" height="2" fill="#DE886D"/>
    <!-- Left arm behind back (hidden mostly) -->
    <rect x="0" y="10" width="2" height="1.5" fill="#C47A5E"/>
    <!-- Right arm raised to head -->
    <g class="hc-think-rarm">
      <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
    </g>
  </g>

  <!-- Thinking dots -->
  <rect class="hc-think-d1" x="5" y="-2" width="1.5" height="1.5" rx="0.2" fill="#DE886D" opacity="0"/>
  <rect class="hc-think-d2" x="7.5" y="-3.5" width="1.5" height="1.5" rx="0.2" fill="#DE886D" opacity="0"/>
  <rect class="hc-think-d3" x="10" y="-5" width="1.5" height="1.5" rx="0.2" fill="#DE886D" opacity="0"/>
</svg>
