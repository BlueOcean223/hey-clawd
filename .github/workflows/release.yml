name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to use for a manual dry run (for example 0.1.1)"
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Resolve release metadata
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "Version must not be empty" >&2
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set build version in Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.VERSION }}" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" Info.plist
          /usr/libexec/PlistBuddy -c "Set :ClawdEnableSparkleUpdater true" Info.plist

      - name: Resolve Xcode packages
        run: xcodebuild -resolvePackageDependencies -project hey-clawd.xcodeproj -scheme hey-clawd

      - name: Archive
        run: |
          xcodebuild -project hey-clawd.xcodeproj \
            -scheme hey-clawd \
            -configuration Release \
            -archivePath ${{ runner.temp }}/hey-clawd.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Re-sign Sparkle components inside-out as ad-hoc
        run: |
          APP_PATH="${{ runner.temp }}/hey-clawd.xcarchive/Products/Applications/hey-clawd.app"
          FW="$APP_PATH/Contents/Frameworks/Sparkle.framework"
          ENT="${{ runner.temp }}/hey-clawd.entitlements"

          cat > "$ENT" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.disable-library-validation</key>
            <true/>
          </dict>
          </plist>
          EOF

          codesign -f -s - -o runtime "$FW/Versions/B/XPCServices/Installer.xpc"
          codesign -f -s - -o runtime --preserve-metadata=entitlements "$FW/Versions/B/XPCServices/Downloader.xpc"
          codesign -f -s - -o runtime "$FW/Versions/B/Autoupdate"
          if [ -d "$FW/Versions/B/Updater.app" ]; then
            codesign -f -s - -o runtime "$FW/Versions/B/Updater.app"
          fi
          codesign -f -s - -o runtime "$FW/Versions/B/Sparkle"
          codesign -f -s - -o runtime "$FW"
          codesign -f -s - -o runtime --entitlements "$ENT" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Create zip
        run: |
          cd "${{ runner.temp }}/hey-clawd.xcarchive/Products/Applications"
          ditto -c -k --sequesterRsrc hey-clawd.app "${{ runner.temp }}/hey-clawd-${{ steps.version.outputs.VERSION }}.zip"

      - name: Create DMG
        run: |
          APP_PATH="${{ runner.temp }}/hey-clawd.xcarchive/Products/Applications/hey-clawd.app"
          DMG_PATH="${{ runner.temp }}/hey-clawd-${{ steps.version.outputs.VERSION }}.dmg"
          STAGE="${{ runner.temp }}/dmg-stage"
          mkdir -p "$STAGE"
          cp -R "$APP_PATH" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "hey-clawd" -srcfolder "$STAGE" -ov -format UDZO "$DMG_PATH"

      - name: Smoke check packaged artifacts
        run: |
          APP_PATH="${{ runner.temp }}/hey-clawd.xcarchive/Products/Applications/hey-clawd.app"
          ZIP_PATH="${{ runner.temp }}/hey-clawd-${{ steps.version.outputs.VERSION }}.zip"
          DMG_PATH="${{ runner.temp }}/hey-clawd-${{ steps.version.outputs.VERSION }}.dmg"

          test -d "$APP_PATH"
          test -s "$ZIP_PATH"
          test -s "$DMG_PATH"
          unzip -tq "$ZIP_PATH"
          hdiutil verify "$DMG_PATH"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hey-clawd-${{ steps.version.outputs.VERSION }}-release-bundle
          path: |
            ${{ runner.temp }}/hey-clawd.xcarchive
            ${{ runner.temp }}/hey-clawd-${{ steps.version.outputs.VERSION }}.zip
            ${{ runner.temp }}/hey-clawd-${{ steps.version.outputs.VERSION }}.dmg
          if-no-files-found: error
          retention-days: 7

      - name: Download Sparkle
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          cd ${{ runner.temp }}
          curl -L -O https://github.com/sparkle-project/Sparkle/releases/download/2.9.1/Sparkle-2.9.1.tar.xz
          tar xf Sparkle-2.9.1.tar.xz

      - name: Sign update with Sparkle
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          echo "$SPARKLE_PRIVATE_KEY" > "${{ runner.temp }}/sparkle_key"
          SIGNATURE=$(${{ runner.temp }}/bin/sign_update "${{ runner.temp }}/hey-clawd-${{ steps.version.outputs.VERSION }}.zip" --ed-key-file "${{ runner.temp }}/sparkle_key" | grep "sparkle:edSignature" | sed 's/.*sparkle:edSignature="\([^"]*\)".*/\1/')
          LENGTH=$(stat -f%z "${{ runner.temp }}/hey-clawd-${{ steps.version.outputs.VERSION }}.zip")
          echo "SIGNATURE=$SIGNATURE" >> "$GITHUB_ENV"
          echo "LENGTH=$LENGTH" >> "$GITHUB_ENV"
          rm "${{ runner.temp }}/sparkle_key"

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        id: release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/hey-clawd-${{ steps.version.outputs.VERSION }}.zip
            ${{ runner.temp }}/hey-clawd-${{ steps.version.outputs.VERSION }}.dmg
          generate_release_notes: true

      - name: Generate appcast.xml
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hey-clawd-${{ steps.version.outputs.VERSION }}.zip"
          cat > appcast.xml << XMLEOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>hey-clawd</title>
              <item>
                <title>Version ${{ steps.version.outputs.VERSION }}</title>
                <pubDate>$(date -R)</pubDate>
                <sparkle:version>${{ github.run_number }}</sparkle:version>
                <sparkle:shortVersionString>${{ steps.version.outputs.VERSION }}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>12.0</sparkle:minimumSystemVersion>
                <enclosure url="${DOWNLOAD_URL}" length="${LENGTH}" type="application/octet-stream" sparkle:edSignature="${SIGNATURE}" />
              </item>
            </channel>
          </rss>
          XMLEOF
          sed -i '' 's/^          //' appcast.xml

      - name: Upload appcast artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: hey-clawd-${{ steps.version.outputs.VERSION }}-appcast
          path: appcast.xml
          if-no-files-found: error
          retention-days: 7

      - name: Commit appcast.xml
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add appcast.xml
          git commit -m "update appcast.xml for ${{ github.ref_name }}" || echo "No changes"
          git push origin main
